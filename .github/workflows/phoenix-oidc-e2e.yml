name: Phoenix OIDC auth (full-compose runtime e2e)

# Runtime-verifies the Phoenix OIDC turnkey-auth chain (D-AUTH-OIDC) through
# the GENERATED docker-compose stack.  Boots the emitted `docker-compose.yml`
# as-is — the containerized Phoenix release (its bin/server runs migrations
# then serves) + the bundled dev Keycloak + postgres — gets a real token for
# the seeded `demo` user, and asserts the generated ApiWeb.Auth OIDC verifier
# (JOSE + the issuer's JWKS, reached over host.docker.internal) validates it
# and maps the configured claims (incl. the dotted realm_access.roles path)
# onto the user {} shape.
#
# This is the RUNTIME proof the compile + Dialyzer gates can't give — the
# :httpc JWKS fetch, the JOSE verify_strict alg set, the :persistent_term
# cache, and the iss check actually working against a real IdP (the Phoenix
# analogue of the bug the .NET runtime e2e caught).  It can't run in the dev
# sandbox (the inner Phoenix image build needs hex egress), so it lives here
# as a CI gate.  The release Dockerfile owns all prod boot/config/migration
# wiring, so there's no native `mix phx.server` orchestration to drift.
#
# Triggers `push: main` + manual dispatch only — NOT per-PR (sibling to the
# other *-oidc-e2e jobs; same rationale, and a Phoenix release image build
# (mix deps.get + compiling Ash) is heavy).
on:
  push:
    branches: [main]
    paths:
      - 'src/generator/elixir/**'
      - 'src/system/index.ts'
      - 'test/e2e/auth-oidc-phoenix-compose-e2e.test.ts'
      - 'test/e2e/fixtures/phoenix-build/auth-oidc.ddd'
      - 'package.json'
      - '.github/workflows/phoenix-oidc-e2e.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phoenix-oidc-e2e:
    runs-on: ubuntu-latest
    # The Phoenix release image build (cold mix deps.get + compiling Ash
    # ~6-10min) + Keycloak boot dominate.  25min cap.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Loom toolchain
        run: npm ci

      - name: Run Phoenix OIDC full-compose runtime e2e
        env:
          LOOM_AUTH_E2E_PHOENIX: '1'
        run: npm run test:auth-e2e-phoenix -- --reporter=verbose

      - name: Surface failure context
        if: failure()
        run: |
          echo '## Phoenix OIDC runtime e2e failed' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the "Run Phoenix OIDC full-compose runtime e2e" step above for the captured `docker compose logs`.' >> $GITHUB_STEP_SUMMARY
          echo 'The test boots the generated docker-compose stack (containerized Phoenix release + bundled dev Keycloak), gets a token for the seeded `demo` user, and asserts the generated ApiWeb.Auth OIDC verifier validates it over host.docker.internal and maps the claims onto the user shape.' >> $GITHUB_STEP_SUMMARY
