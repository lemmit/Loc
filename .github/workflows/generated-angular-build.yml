name: Generated Angular build

# For each {case × angular pack} cell, generate the Angular project,
# `npm install`, and `ng build` it (the Angular CLI typechecks + bundles
# in one step).  The Angular analogue of generated-vue-build.yml — catches
# generator/pack drift invisible to the IR-level tests, institutionalising
# the per-PR `ng build` verification from the Slice-4 batches.
#
# Matrix policy:
#   - pull_request    → showcase (read + create-form + byId + action surface)
#                       and store (shared signal-store surface) × the packs.
#   - push: main /    → full sweep ({minimal, scaffold, showcase, store}).
#     workflow_dispatch
#
# Cell names MUST match the case labels in
# test/e2e/generated-angular-build.test.ts (`<case>:<pack>`).

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'designs/angularMaterial/**'
      - 'api/**'
      - 'docker/**'
      - 'stacks/ng1/**'
      - 'test/e2e/generated-angular-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/generated-angular-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'designs/angularMaterial/**'
      - 'api/**'
      - 'docker/**'
      - 'stacks/ng1/**'
      - 'test/e2e/generated-angular-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/generated-angular-build.yml'
      # A change confined to a non-Angular backend cannot alter the Angular
      # bundle — skip this gate per-PR when only that code changed.  The
      # push:main trigger above keeps the broad `src/**` net post-merge.
      - '!src/generator/java/**'
      - '!src/generator/dotnet/**'
      - '!src/generator/python/**'
      - '!src/generator/elixir/**'
      - '!src/platform/java.ts'
      - '!src/platform/dotnet.ts'
      - '!src/platform/dotnet/**'
      - '!src/platform/python.ts'
      - '!src/platform/elixir.ts'
      - '!src/platform/hono/**'
      - '!src/platform/hono.ts'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  configure:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Slim PR slice: the two most representative cases (feature
            # showcase + the shared signal-store surface) × two
            # representative packs (Material + PrimeNG).  spartanNg, the
            # `minimal`/`scaffold`/`file` cases, and full pack drift are
            # caught by the push:main sweep below one merge later.
            CASES='["showcase","store"]'
            PACKS='["angularMaterial@v1", "primeng@v1"]'
          else
            CASES='["minimal","scaffold","showcase","store","file"]'
            PACKS='["angularMaterial@v1", "primeng@v1", "spartanNg@v1"]'
          fi
          echo "matrix={\"case\":$CASES,\"pack\":$PACKS}" >> "$GITHUB_OUTPUT"

  matrix:
    needs: configure
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.configure.outputs.matrix) }}
    timeout-minutes: 12
    name: ${{ matrix.case }} × ${{ matrix.pack }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Loom toolchain
        run: npm ci

      - name: Build toolchain
        run: npm run build

      - name: Run angular-build shard
        env:
          LOOM_ANGULAR_BUILD_CASE: ${{ matrix.case }}:${{ matrix.pack }}
        run: npx vitest run test/e2e/generated-angular-build.test.ts
