name: Deploy landing page + playground to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'web/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      # Root install runs the `prepare` lifecycle, which calls
      # `langium:generate` to produce src/language/generated/.  The
      # web/ project imports that path via the toolchain re-exports,
      # so it must exist before the playground build runs.
      - name: Install Loom toolchain (root)
        run: npm ci

      - name: Render landing page + docs
        run: |
          npm install --no-save marked@^14
          node docs/build.mjs

      - name: Install playground deps
        working-directory: web
        run: npm ci

      - name: Typecheck playground
        working-directory: web
        run: npm run typecheck

      - name: Smoke playground (Node-side end-to-end)
        working-directory: web
        run: npm run e2e:smoke

      - name: Build playground
        working-directory: web
        run: npm run build

      - name: Stage playground under _site/playground
        run: |
          mkdir -p docs/_site/playground
          cp -r web/dist/. docs/_site/playground/

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site
      - id: deployment
        uses: actions/deploy-pages@v5
