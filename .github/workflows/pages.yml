name: Deploy landing page + playground to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'web/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:
  merge_group:
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      # Root install runs the `prepare` lifecycle, which calls
      # `langium:generate` to produce src/language/generated/.  The
      # web/ project imports that path via the toolchain re-exports,
      # so it must exist before the playground build runs.
      - name: Install Loom toolchain (root)
        run: npm ci

      - name: Render landing page + docs
        run: node docs/build.mjs

      - name: Install playground deps
        working-directory: web
        run: npm ci

      - name: Typecheck playground
        working-directory: web
        run: npm run typecheck

      # Network-free unit guard for the runtime DDL synth — catches the
      # per-context-pgSchema regression class (system-mode backends
      # query schema-qualified tables) that the network-dependent
      # e2e/runtime.spec.ts self-skips when the npm registry is
      # unreachable.
      - name: Test runtime DDL synth
        working-directory: web
        run: npm run test:ddl

      - name: Smoke playground (Node-side end-to-end)
        working-directory: web
        run: npm run e2e:smoke

      # C1: download the curated stacks' tarballs into
      # web/public/npm-mirror/ so the deployed playground installs
      # same-origin (no registry.npmjs.org round-trips).  vite build
      # copies public/ into dist/.
      - name: Build npm mirror
        working-directory: web
        run: npm run build:npm-mirror

      # C2: prebuild each design pack's frontend vendor (react + UI
      # libs) into shipped ESM chunks + importmap so the per-session
      # esbuild-wasm bundle externalises the vendor and bundles only
      # the generated app.  vite build copies public/ into dist/.
      - name: Build design-pack vendor
        working-directory: web
        run: npm run build:vendor

      - name: Build playground
        working-directory: web
        run: npm run build

      - name: Stage playground under _site/playground
        run: |
          mkdir -p docs/_site/playground
          cp -r web/dist/. docs/_site/playground/

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site
      - id: deployment
        uses: actions/deploy-pages@v5
