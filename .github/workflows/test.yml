name: Tests + coverage

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'web/**'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - 'vitest.config.ts'
      - 'biome.json'
      - 'biome.generated.json'
      - 'designs/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'web/**'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - 'vitest.config.ts'
      - 'biome.json'
      - 'biome.generated.json'
      - 'designs/**'
      - '.github/workflows/test.yml'
  merge_group:
permissions:
  contents: read

# Cancel in-flight runs of the same branch when a new commit lands —
# saves CI minutes on rebases / force-pushes (mirrors the pattern in
# playground-e2e.yml and generated-react-build.yml).  The latest
# commit is what ultimately gets gated.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The fast vitest suite is ~900s of CPU-bound generator/IR work spread
  # evenly across ~700 files (no single hot file — the slowest is <5%),
  # so the only real lever is horizontal scaling: split the files across
  # N runners with `vitest --shard`.  Each shard emits a `blob` report
  # (raw per-test + v8 coverage data); the `coverage` job below merges
  # the blobs into one combined report.  4 shards turns a ~20min single
  # job into ~4 parallel jobs of ~3-4min each.  Bump the matrix (and the
  # `/4` denominators) together to add shards.
  test:
    name: test (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel sibling shards when one fails — we want the full
      # failure picture across the whole suite in a single run.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # `npm ci` runs the `prepare` lifecycle (langium:generate + build),
      # which produces src/language/generated/ + out/ — required before
      # vitest transforms any file that imports the generated AST, and
      # before the CLI tests spawn `node bin/cli.js` (which runs `out/`).
      - name: Install (runs langium:generate + build)
        run: npm ci

      # `--coverage` so the blob carries v8 coverage data for the merge
      # job; `--reporter=default` keeps failures visible in this job's
      # log, `--reporter=blob` writes .vitest-reports/blob-<i>-4.json.
      - name: Test with coverage (shard ${{ matrix.shard }}/4)
        run: npm run test:coverage -- --shard=${{ matrix.shard }}/4 --reporter=default --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-${{ matrix.shard }}
          path: .vitest-reports/*
          include-hidden-files: true
          retention-days: 1

  # Merge the per-shard blob reports into one combined coverage report.
  # `vitest --merge-reports` re-runs only the reporters (no tests) over
  # the recorded blobs, so the summary/% is computed across all shards.
  coverage:
    name: coverage (merge shards)
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Source must be present (+ built) for v8 coverage remapping during
      # the merge; `npm ci` provides src/language/generated/ + out/.
      - name: Install (runs langium:generate + build)
        run: npm ci

      - name: Download shard blob reports
        uses: actions/download-artifact@v7
        with:
          pattern: blob-*
          path: .vitest-reports
          merge-multiple: true

      - name: Merge shard reports + emit combined coverage
        run: npx vitest --merge-reports --coverage

      - name: Coverage summary
        if: always()
        run: |
          node -e '
            const fs = require("node:fs");
            const p = "coverage/coverage-summary.json";
            if (!fs.existsSync(p)) { console.log("no coverage summary"); process.exit(0); }
            const t = JSON.parse(fs.readFileSync(p, "utf8")).total;
            const row = (k) => `| ${k} | ${t[k].pct}% | ${t[k].covered}/${t[k].total} |`;
            const md = [
              "## Coverage",
              "",
              "| Metric | % | Covered/Total |",
              "| --- | --- | --- |",
              row("statements"), row("branches"), row("functions"), row("lines"),
            ].join("\n");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
          '

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14

  # Biome gates, split off the test shards so they run once (not 4×) and
  # in parallel with them: `biome ci` over the repo + the generated-code
  # Biome gate (emits TS/TSX projects and lints them).
  lint:
    name: lint + generated biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install (runs langium:generate + build)
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Generated-code Biome gate
        run: npm run test:biome-gen

      # accessibility.md — static per-pack WCAG-AA design-token contrast gate.
      - name: Design-token contrast gate
        run: npm run test:contrast

  # Single roll-up status for branch protection: succeeds only when every
  # shard, the coverage merge, and the lint gates pass.  Require THIS
  # check instead of the per-shard `test (shard i/4)` jobs so the shard
  # count can change without editing branch-protection rules.
  tests-passed:
    name: tests passed
    needs: [test, coverage, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on upstream job results
        run: |
          echo "test=${{ needs.test.result }} coverage=${{ needs.coverage.result }} lint=${{ needs.lint.result }}"
          [ "${{ needs.test.result }}" = "success" ] \
            && [ "${{ needs.coverage.result }}" = "success" ] \
            && [ "${{ needs.lint.result }}" = "success" ]

  # Fast typecheck gate for the playground (`web/`).  The playground imports
  # the Loom toolchain straight from `../src`, so a `src/` change can silently
  # break `web/` — exactly the failure mode of PR #517, where a `case "Form"`
  # in web/src/builder/page/components.tsx survived a `PrimitiveName` narrowing
  # in src/ir/loom-ir.ts and only surfaced days later in playground-e2e.  This
  # job closes that gap in under two minutes by running `tsc -b` against
  # `web/` (skipping `vite build`, which `web`'s `npm run build` script
  # bundles in).
  web-tsc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      # Root install runs the `prepare` lifecycle (langium:generate + build);
      # `web/` resolves `../src/language/generated/**` at typecheck time, so
      # this must complete before `tsc -b` runs inside `web/`.
      - name: Install root (runs langium:generate + build)
        run: npm ci

      - name: Install web
        working-directory: web
        run: npm ci

      # `npm run build` in web/ chains `tsc -b && vite build`; we only need
      # the typecheck for this gate, so invoke `tsc` directly.
      - name: Typecheck web
        working-directory: web
        run: npx tsc -b

      # Network-free unit guard for the runtime DDL synth — pre-merge gate
      # for the per-context-pgSchema regression (system-mode backends query
      # schema-qualified tables).  The end-to-end e2e/runtime.spec.ts covers
      # the same path but self-skips when the npm registry is unreachable,
      # so it doesn't gate reliably; this does.
      - name: Test runtime DDL synth
        working-directory: web
        run: npm run test:ddl
