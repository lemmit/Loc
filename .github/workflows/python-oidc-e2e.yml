name: Python OIDC auth (runtime e2e)

# Runtime-verifies the OIDC turnkey-auth chain (D-AUTH-OIDC) on the
# Python/FastAPI backend, end-to-end: boots a REAL Keycloak (the bundled dev
# realm import) + postgres in docker, runs the generated FastAPI app natively
# (`uv run uvicorn`), gets a real token for the seeded `demo` user via the
# password grant, and asserts the generated OIDC verifier validates it (PyJWT
# against the issuer's JWKS) and maps the configured claims (incl. the dotted
# realm_access.roles path) onto User.  Also smoke-checks the /auth/login
# handshake entry (307 to the IdP).
#
# The Python sibling of dotnet-oidc-e2e.yml — the runtime check the
# ruff + mypy --strict build gate can't give.  ubuntu-latest ships docker; the
# app runs natively via uv, Keycloak + postgres are pulled images (no build).
#
# Triggers `push: main` + manual dispatch only — NOT per-PR (sibling to the
# other *-oidc-e2e jobs; same rationale: regression net, not a PR gate, and
# Keycloak boot is heavier than a unit suite).
on:
  push:
    branches: [main]
    paths:
      - 'src/generator/python/**'
      - 'src/system/index.ts'
      - 'test/e2e/auth-oidc-python-e2e.test.ts'
      - 'test/e2e/fixtures/python-build/auth-oidc.ddd'
      - 'package.json'
      - '.github/workflows/python-oidc-e2e.yml'
  workflow_dispatch:
  merge_group:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  python-oidc-e2e:
    runs-on: ubuntu-latest
    # Keycloak boot (~25s) + the generated project's `uv sync` (cold ~1-2min)
    # dominate.  12min cap.
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Loom toolchain
        run: npm ci

      - name: Build Loom toolchain
        run: npm run build

      - name: Run Python OIDC runtime e2e
        env:
          LOOM_AUTH_E2E_PYTHON: '1'
        run: npm run test:auth-e2e-python -- --reporter=verbose

      - name: Surface failure context
        if: failure()
        run: |
          echo '## Python OIDC runtime e2e failed' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the "Run Python OIDC runtime e2e" step above for the captured backend stdout.' >> $GITHUB_STEP_SUMMARY
          echo 'The test boots a real Keycloak + postgres, gets a token for the seeded `demo` user, and asserts the generated OIDC verifier validates it (PyJWT/JWKS) and maps the claims onto User.' >> $GITHUB_STEP_SUMMARY
