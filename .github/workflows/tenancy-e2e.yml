name: Tenancy isolation (runtime e2e)

# Boots the generated backend from the `tenancy-owned.ddd` corpus fixture
# against a throwaway postgres, then proves cross-tenant isolation END TO END:
#   POST invoice as org-a → 201; org-a GETs it → 200; org-b GETs it → 404;
#   org-b's list omits it; a client-smuggled tenantId is ignored; crossTenant
#   reference data is visible to all; and the registry self-scope + claim-less
#   signup bootstrap round-trips (`tenantId ≡ Organization.id`).
#
# Fanned across backends as a matrix (the shared assertion sequence in
# test/e2e/support/tenancy-isolation-harness.ts drives every backend; only the
# boot differs). Each cell drives two principals via the dev-stub
# `x-loom-dev-claims` header — the parity (#1673) that makes this cross-backend.
# All five backends run this matrix (REST create→read): node/python/java/dotnet
# + elixir.  The .NET leg gates the fix for a runtime isolation DEFECT this tier
# found: the EF global query filter referenced the STATIC ambient currentUser,
# so EF baked it once at model build and leaked cross-tenant — fixed by
# installing the filter on AppDbContext reading the injected scoped
# ICurrentUserAccessor.
#
# The elixir leg joined once the vanilla Phoenix router create-route parity bug
# was fixed: the tenancy fixture's aggregates are BARE (`with tenantOwned` /
# `crossTenant` / bare registry — no `with crudish`), so the router wired no
# `POST /<plural>` for them (it gated the create route on explicit `creates`
# while the controller emitted the `create` action — and the OpenAPI spec
# documented it — by constructibility).  `POST /api/invoices` 404'd on a
# documented, implemented endpoint.  Fixed by routing create off the shared
# `emitsRestCreate` predicate (the same gate the OpenAPI `post` uses), matching
# `hasCreate`/`isConstructible` on the other four backends.  The Ecto repository
# threads current_user per call and rebuilds the `where tenant_id == ^claim`
# filter fresh each request, so it is immune to the EF baked-filter class.
#
# This is the assertion the structural tiers CANNOT make: per-backend generator
# tests pin the filter and the 1a.0 pins the stamp, but only a boot proves the
# two AGREE — the pre-1a.0 bug (stamp writes the actor id, filter reads the
# claim) made every created row invisible and no structural test saw it. (The
# per-backend runtime e2e already earned its keep: it caught the python
# dev-claims injection silently no-oping on a snake_case field — green compile,
# no actual isolation.)
#
# Uses a `services: postgres` container (not docker-in-runner) and hands the
# test its URL via LOOM_TENANCY_PG_URL, so the suite skips its own docker
# sidecar.
#
# Triggers `push: main` + manual dispatch only — NOT per-PR. Sibling to the
# obs-e2e / oidc-e2e jobs; same rationale: a docker-heavy boot on every
# tenancy-touching PR is a runner burst for a regression that is acceptable to
# catch one merge later. The structural filter/stamp pins ARE per-PR (in the
# fast vitest suite); this gate nets the end-to-end agreement.
on:
  push:
    branches: [main]
    paths:
      - 'src/macros/prelude.ts'
      - 'src/language/validators/tenancy.ts'
      - 'src/ir/validate/checks/tenancy-checks.ts'
      - 'src/ir/util/tenant-stance.ts'
      - 'src/ir/enrich/enrichments.ts'
      - 'src/generator/python/index.ts'
      - 'src/generator/java/emit/auth.ts'
      - 'src/generator/dotnet/emit/efcore.ts'
      - 'src/generator/dotnet/auth-emit.ts'
      - 'src/generator/elixir/vanilla/api-emit.ts'
      - 'src/generator/elixir/vanilla/openapi-emit.ts'
      - 'src/platform/hono/**'
      - 'test/e2e/tenancy-isolation.test.ts'
      - 'test/e2e/tenancy-isolation-python.test.ts'
      - 'test/e2e/tenancy-isolation-java.test.ts'
      - 'test/e2e/tenancy-isolation-dotnet.test.ts'
      - 'test/e2e/tenancy-isolation-elixir.test.ts'
      - 'test/e2e/tenancy-hierarchy.test.ts'
      - 'test/e2e/tenancy-hierarchy-python.test.ts'
      - 'test/e2e/tenancy-hierarchy-java.test.ts'
      - 'test/e2e/tenancy-hierarchy-dotnet.test.ts'
      - 'test/e2e/tenancy-hierarchy-elixir.test.ts'
      - 'test/e2e/support/tenancy-isolation-harness.ts'
      - 'test/fixtures/corpus/tenancy-owned.ddd'
      - 'test/fixtures/corpus/tenancy-hierarchy.ddd'
      - 'package.json'
      - '.github/workflows/tenancy-e2e.yml'
  workflow_dispatch:
  merge_group:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tenancy-e2e:
    runs-on: ubuntu-latest
    # Cold path is dominated by the generated project's build/dep install
    # (gradle bootJar / mix deps.get + compile are the slowest). 20min cap.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Flat tenant floor (tenancy-owned.ddd) — one boot per backend.
          - backend: node
            suite: flat
            script: test:tenancy
          - backend: python
            suite: flat
            script: test:tenancy-python
          - backend: java
            suite: flat
            script: test:tenancy-java
          - backend: dotnet
            suite: flat
            script: test:tenancy-dotnet
          - backend: elixir
            suite: flat
            script: test:tenancy-elixir
          # Hierarchy / policy read ladder (tenancy-hierarchy.ddd) — a SEPARATE
          # cell per backend (own boot, own 20-min budget), so the heavier
          # backends never run two boots in one job.
          - backend: node
            suite: hierarchy
            script: test:tenancy-hierarchy
          - backend: python
            suite: hierarchy
            script: test:tenancy-hierarchy-python
          - backend: java
            suite: hierarchy
            script: test:tenancy-hierarchy-java
          - backend: dotnet
            suite: hierarchy
            script: test:tenancy-hierarchy-dotnet
          - backend: elixir
            suite: hierarchy
            script: test:tenancy-hierarchy-elixir
    name: tenancy-e2e (${{ matrix.backend }} / ${{ matrix.suite }})
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up uv (python)
        if: matrix.backend == 'python'
        uses: astral-sh/setup-uv@v7

      - name: Set up JDK (java)
        if: matrix.backend == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      # Java 25 toolchain needs Gradle 9.1+ (no wrapper is emitted).
      - name: Set up Gradle (java)
        if: matrix.backend == 'java'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'

      - name: Set up .NET (dotnet)
        if: matrix.backend == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Elixir/OTP (elixir)
        if: matrix.backend == 'elixir'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.3'
          elixir-version: '1.18.4'

      - name: Install Loom toolchain
        run: npm ci

      - name: Run tenancy isolation runtime e2e (${{ matrix.backend }})
        env:
          LOOM_TENANCY_PG_URL: postgres://postgres:postgres@127.0.0.1:5432/app
        run: npm run ${{ matrix.script }} -- --reporter=verbose

      - name: Surface failure context
        if: failure()
        run: |
          echo "## Tenancy isolation runtime e2e failed (${{ matrix.backend }})" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the run step above for the captured server stdout.' >> $GITHUB_STEP_SUMMARY
          echo 'The test boots the generated backend against postgres and asserts cross-tenant isolation (create/read/list as two principals), client tenantId-smuggling rejection, crossTenant visibility, and the registry self-scope + claim-less signup bootstrap.' >> $GITHUB_STEP_SUMMARY
