name: Phoenix LiveView build verification

# For every fixture under `test/e2e/fixtures/phoenix-build/`, generate
# a Phoenix project then `mix deps.get && mix compile --warnings-as-errors`
# inside the hexpm/elixir Docker image.  Catches Ash 3.x API drift,
# OpenApiSpex schema mismatches, join-table emission bugs, and any
# other emission that only surfaces when the generated source
# actually compiles.
#
# The actual generate + compile loop lives in
# `test/e2e/generated-phoenix-build.test.ts` (entrypoint:
# `npm run test:phoenix`); this workflow is a thin wrapper that
# pre-generates once to compute the deps-cache signature, restores
# the cache, then hands off to the test (which honours
# `LOOM_PHOENIX_OUT_DIR` and skips regeneration when the project is
# already on disk).  Both the workflow and the test read the same
# fixture files, so language-feature additions no longer need a
# separate workflow-side update (compare #524 → #541 follow-up).
#
# Triggers:
#   - PRs that touch the Phoenix generator, the ashPhoenix design pack,
#     the fixtures, or the test.
#   - Pushes to main (full regression check).
#   - Manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - 'src/generator/phoenix-live-view/**'
      - 'src/platform/phoenix-live-view.ts'
      - 'designs/ashPhoenix/**'
      - 'examples/**'
      - 'test/e2e/fixtures/phoenix-build/**'
      - 'test/e2e/generated-phoenix-build.test.ts'
      - 'package.json'
      - '.github/workflows/phoenix-build.yml'
  pull_request:
    paths:
      - 'src/generator/phoenix-live-view/**'
      - 'src/platform/phoenix-live-view.ts'
      - 'designs/ashPhoenix/**'
      - 'examples/**'
      - 'test/e2e/fixtures/phoenix-build/**'
      - 'test/e2e/generated-phoenix-build.test.ts'
      - 'package.json'
      - '.github/workflows/phoenix-build.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-flight runs of the same branch when a new commit lands —
# saves CI minutes on rebases / force-pushes (mirrors the pattern in
# test.yml / playground-e2e.yml / generated-react-build.yml).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-generated-phoenix:
    runs-on: ubuntu-latest
    # Tight cap to protect CI minutes.  Cold path (no cache hit) is
    # ~3-4min dominated by `mix deps.get`; warm runs (deps cache
    # restored) are ~60-90s for the two fixtures.  10min leaves
    # headroom without letting a hung job burn through quota.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # `npm ci` runs the `prepare` lifecycle (langium:generate +
      # build) which populates src/language/generated/.  No need for a
      # separate `npm run build` step — `prepare` does it.
      - name: Install Loom toolchain
        run: npm ci

      # Pre-generate each fixture once into a stable path so we can
      # hash the emitted mix.exs for the cache key.  Cheap (~1s per
      # fixture, no docker, no hex fetch).  The test step below honours
      # `LOOM_PHOENIX_OUT_DIR` and re-uses the same tree (skipping its
      # own regeneration when `mix.exs` already exists), so the docker
      # `mix compile` runs against THIS pre-generated source with deps
      # restored from the cache.
      - name: Pre-generate fixtures (for cache key)
        run: |
          for fixture in test/e2e/fixtures/phoenix-build/*.ddd; do
            stem=$(basename "$fixture" .ddd)
            mkdir -p "/tmp/ci/phoenix/$stem/out"
            node bin/cli.js generate system "$fixture" -o "/tmp/ci/phoenix/$stem/out"
          done

      # The dep set only changes when the emitted mix.exs changes, so
      # we sign the cache key on a concatenated hash of every fixture's
      # mix.exs.  Avoids the broad-source-hash churn that would mint a
      # fresh ~hundreds-of-MB cache entry on unrelated emitter edits
      # (and evict unrelated caches under the 10GB repo quota).
      - name: Compute Phoenix dep signature
        id: phoenix-depsig
        run: |
          hash=$(cat /tmp/ci/phoenix/*/out/phoenix_app/mix.exs | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Cache Phoenix deps + _build
        uses: actions/cache@v5
        with:
          path: |
            /tmp/ci/phoenix/*/out/phoenix_app/deps
            /tmp/ci/phoenix/*/out/phoenix_app/_build
          key: phoenix-mix-${{ steps.phoenix-depsig.outputs.hash }}
          # On cache miss (mix.exs changed), fall back to the most
          # recent stale cache so mix only re-fetches deltas instead
          # of the full ~3-4min cold dep set.
          restore-keys: |
            phoenix-mix-

      # Hand off to the test — its `it.each` iterates every fixture,
      # spawns `docker run mix compile --warnings-as-errors`, and
      # surfaces failures via vitest's reporter into the job log
      # (captured via `stdio: "inherit"` in the test).
      - name: Run test:phoenix (mix compile against every fixture)
        env:
          LOOM_PHOENIX_OUT_DIR: /tmp/ci/phoenix
        run: npm run test:phoenix

      # Mirrors dotnet-obs-e2e.yml's failure-context pattern — point
      # readers at the captured docker / mix output that vitest
      # already printed to the job log via stdio: inherit.
      - name: Surface failure context
        if: failure()
        run: |
          echo '## Phoenix mix compile failed' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the "Run test:phoenix" step above for the captured `mix deps.get` + `mix compile --warnings-as-errors` diagnostics from each fixture.' >> $GITHUB_STEP_SUMMARY
          echo 'Each fixture under `test/e2e/fixtures/phoenix-build/` runs as its own `it.each` iteration in `test/e2e/generated-phoenix-build.test.ts`.' >> $GITHUB_STEP_SUMMARY
