name: Phoenix LiveView build verification

# Generates a Phoenix project from examples/acme.ddd retargeted onto
# the phoenixLiveView platform, then runs `mix deps.get && mix compile`
# inside an Elixir/Erlang container.  Catches Ash 3.x API drift,
# OpenApiSpex schema mismatches, and any other emission bug that
# only surfaces when the generated source actually compiles.
#
# Triggers:
#   - PRs that touch the Phoenix generator, the ashPhoenix design pack,
#     or the parity follow-ups plan.
#   - Pushes to main (full regression check).
#   - Manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - 'src/generator/phoenix-live-view/**'
      - 'src/platform/phoenix-live-view.ts'
      - 'designs/ashPhoenix/**'
      - 'examples/**'
      - 'package.json'
      - '.github/workflows/phoenix-build.yml'
  pull_request:
    paths:
      - 'src/generator/phoenix-live-view/**'
      - 'src/platform/phoenix-live-view.ts'
      - 'designs/ashPhoenix/**'
      - 'examples/**'
      - 'package.json'
      - '.github/workflows/phoenix-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-generated-phoenix:
    runs-on: ubuntu-latest
    # Tight cap to protect CI minutes.  First-run cold mix compile is
    # ~3-4min; warm runs (with deps cache below) are ~1min.  10min
    # leaves headroom without letting a hung job burn through quota.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # Build the Loom toolchain.  `prepare` lifecycle runs
      # `langium:generate` which populates src/language/generated/.
      - name: Install Loom toolchain
        run: npm ci

      - name: Type-check
        run: npm run build

      - name: Unit tests
        run: |
          set -o pipefail
          npx vitest run --reporter=verbose 2>&1 | tee vitest.log

      # Surface the failing test names + assertions from the vitest log
      # as GitHub Actions annotations whenever Unit tests fail.  Each
      # `::error::` line becomes an annotation entry on the check run,
      # which is reachable via the unauthenticated REST endpoint that
      # the PR webhook readers (this Claude session included) consume.
      # Also dumps the tail to GITHUB_STEP_SUMMARY for human readers.
      - name: Surface vitest failures on failure
        if: failure()
        run: |
          echo '## Unit tests output (tail)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 300 vitest.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Extract failing test names + their immediate context and
          # turn them into ::error:: annotations (visible in the
          # check-runs API without log auth).  `awk` grabs the FAIL
          # block (~ vitest's verbose "FAIL  test/foo.test.ts > …"
          # header through the next blank line); `head -c` keeps each
          # annotation under GitHub's 64KB cap.
          if grep -E '^ FAIL  | ❯ |AssertionError|Error:' vitest.log > vitest.fails 2>/dev/null; then
            while IFS= read -r line; do
              # Strip leading whitespace + the indented vitest prefix
              clean=$(printf '%s' "$line" | sed 's/^[[:space:]]*//')
              # Truncate to 500 chars (annotations get truncated by
              # GH anyway, and keep the room for many fails).
              short=$(printf '%s' "$clean" | head -c 500)
              echo "::error::$short"
            done < vitest.fails
          fi

      # Generate a fixture Phoenix project from examples/acme.ddd.
      # The example today targets dotnet + hono + react; we synthesise
      # a sibling .ddd that adds a phoenixLiveView deployable serving
      # the same modules + UI.
      - name: Generate fixture .ddd with phoenixLiveView deployable
        run: |
          mkdir -p /tmp/ci
          cat > /tmp/ci/acme-lv.ddd <<'EOF'
          system AcmeLV {
            module Sales {
              context Sales {
                aggregate Customer {
                  name: string display
                  email: string
                  invariant email.length > 0
                }
                repository Customers for Customer { }
              }
            }
            api SalesApi from Sales
            ui SalesAdmin { scaffold modules: Sales }
            deployable phoenixApp {
              platform: phoenixLiveView
              modules: Sales
              serves: SalesApi
              ui: SalesAdmin
              port: 4000
            }
          }
          EOF

      - name: Generate Phoenix project
        run: |
          ./bin/cli.js generate system /tmp/ci/acme-lv.ddd -o /tmp/ci/out
          ls /tmp/ci/out/phoenix_app

      # Per-file syntax check — works without `mix deps.get`.  Catches
      # any emission that produces malformed Elixir even when the deps
      # can't be fetched.
      # Per-file syntax check — works without `mix deps.get`.  Catches
      # any emission that produces malformed Elixir even when the deps
      # can't be fetched.  Uses explicit `docker run` (rather than the
      # `uses: docker://…` action shape) so we can mount `/tmp/ci/out`
      # — `docker://` actions only see `$GITHUB_WORKSPACE`, which left
      # the previous invocation looking at an empty tree.
      - name: Elixir syntax check
        run: |
          docker run --rm \
            -v /tmp/ci/out/phoenix_app:/app \
            -w /app \
            hexpm/elixir:1.17.2-erlang-27.0.1-debian-bookworm-20240722-slim \
            bash -c '
              fail=0
              for f in $(find lib config priv -name "*.ex" -o -name "*.exs"); do
                out=$(elixir -e "Code.string_to_quoted!(File.read!(\"$f\"))" 2>&1)
                if [ -n "$out" ]; then
                  echo "::error file=$f::$out"
                  fail=1
                fi
              done
              if [ "$fail" -eq 0 ]; then
                echo "All Elixir files parse cleanly ($(find lib config priv -name "*.ex" -o -name "*.exs" | wc -l) files)."
              fi
              exit $fail
            '

      # Full mix compile against the real Ash 3.x dep set.  This is
      # the gold-standard check — verifies that the orchestrator's
      # output is semantically valid (right Ash.transaction signature,
      # right code_interface form, right OpenApiSpex shapes, etc.).
      # On the GitHub runner, repo.hex.pm is reachable directly so
      # the egress-proxy block I hit in the sandbox doesn't apply.

      # Cache the hex dep tree + Elixir build outputs across runs so
      # only the first cold run pays the ~3-4min download/compile
      # cost.  Cache key is rooted on the lockfile content (mix.lock
      # would be regenerated identically by the emitter unless deps
      # changed); since the generator emits mix.exs but not mix.lock,
      # we use the emitter source as the dep signature.  Restore on
      # any miss so a wrong key still gets partial deps.
      - name: Cache Phoenix deps + _build
        uses: actions/cache@v5
        with:
          path: |
            /tmp/ci/out/phoenix_app/deps
            /tmp/ci/out/phoenix_app/_build
          key: phoenix-mix-${{ hashFiles('src/generator/phoenix-live-view/**', 'designs/ashPhoenix/**') }}
          restore-keys: |
            phoenix-mix-

      - name: mix deps.get && mix compile
        run: |
          docker run --rm \
            -v /tmp/ci/out/phoenix_app:/app \
            -w /app \
            -e MIX_ENV=prod \
            hexpm/elixir:1.17.2-erlang-27.0.1-debian-bookworm-20240722-slim \
            bash -c '
              set -e
              mix local.hex --force
              mix local.rebar --force
              mix deps.get --only prod
              mix compile --warnings-as-errors
            '
