name: Generated Feliz build

# Generate the Feliz (Fable/F#/Elmish) frontend from a .ddd, then prove the
# emitted F# compiles via `dotnet fable` and bundles via `vite build` — the
# analogue of generated-react-build.yml (which tscs the emitted TSX) — AND that
# the bundle actually RUNS: a `vite preview` + headless-Chromium smoke drives the
# MVU loop, routing, and the wire layer's Remote state (the runtime sibling the
# other frontends get from generated-{vue,svelte}-e2e.yml, folded in here to
# reuse the single slow `dotnet fable` step).  Catches generator drift that
# lowers cleanly to IR but emits non-compiling / non-running F# — invisible to
# the fast vitest suite.
#
# One cell (the full CRUD showcase, inline below); grows example-by-example as
# the procedural pack does.  The .ddd is embedded here (not under examples/) so
# the other example-globbing gates never pick up a feliz-only source.

on:
  push:
    branches: [main]
    paths:
      - 'src/generator/feliz/**'
      - 'src/generator/_walker/**'
      - 'src/platform/feliz.ts'
      - 'src/platform/metadata.ts'
      - 'src/platform/registry.ts'
      - 'src/language/ddd.langium'
      - 'scripts/feliz-smoke.mjs'
      - 'scripts/feliz-scaffold-smoke.mjs'
      - '.github/workflows/generated-feliz-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/generator/feliz/**'
      - 'src/generator/_walker/**'
      - 'src/platform/feliz.ts'
      - 'src/platform/metadata.ts'
      - 'src/platform/registry.ts'
      - 'src/language/ddd.langium'
      - 'scripts/feliz-smoke.mjs'
      - 'scripts/feliz-scaffold-smoke.mjs'
      - '.github/workflows/generated-feliz-build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  feliz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install + build the toolchain
        run: npm ci
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - name: Generate the Feliz showcase system
        run: |
          mkdir -p ci-feliz
          # Four-page routed app — exercises multi-page routing (Page union +
          # parseUrl + React.router + Router.navigate) ALONGSIDE the wire layer
          # (Thoth decoders + Cmd-based Api + the Remote/QueryView MVU
          # projection — BOTH list `.all` and byId detail reads), the MVU counter
          # (state + action → dispatch), and the pack primitives
          # (Heading/Badge/Text/Button/Divider/Card + For).  The ProductDetail
          # page covers byId-on-navigation: a `:id` route → a `Remote<T option>`
          # fired via `pageCmd` on entry, rendered through `View.remoteOne`, plus
          # a `DestroyForm` (delete) → a mutation Cmd + navigate-on-success and an
          # `OperationForm` (a custom `rename` op) → an id-qualified POST to
          # /{id}/rename.  The ProductNew page covers a `CreateForm` → Thoth
          # encoders + Elmish form state (inputs → Set Msgs) + a POST Cmd.
          cat > ci-feliz/showcase.ddd <<'DDD'
          system Storefront {
            api ShopApi from Catalog

            subdomain Catalog {
              context Cat {
                aggregate Product with crudish {
                  name:  string
                  price: money
                  operation rename(newName: string) { name := newName }
                }
                repository Products for Product { }
              }
            }

            storage db { type: postgres }
            resource catState { for: Cat, kind: state, use: db }

            ui WebApp {
              api Shop: ShopApi
              page Home {
                route: "/"
                state { count: int = 0 }
                action inc() { count := count + 1 }
                body: Stack {
                  Heading { "Storefront", level: 1 },
                  Badge { "beta" },
                  Text { "Clicks: " + count },
                  Button { "+", onClick: inc },
                  Divider { },
                  Button { "Browse products", to: "/products" }
                }
              }
              page Products {
                route: "/products"
                body: Stack {
                  Heading { "Products", level: 1 },
                  QueryView {
                    of:      Shop.Product.all,
                    loading: Text { "Loading…" },
                    error:   Text { "Failed to load" },
                    empty:   Text { "No products yet." },
                    data:    rows => Stack {
                      For { each: rows, p => Card { p.name,
                        Text { p.price }
                      } }
                    }
                  },
                  Button { "Add a product", to: "/products/new" },
                  Button { "Back home", to: "/" }
                }
              }
              page ProductNew {
                route: "/products/new"
                body: Stack {
                  Heading { "New product", level: 1 },
                  CreateForm { of: Product },
                  Button { "Cancel", to: "/products" }
                }
              }
              page ProductDetail {
                route: "/products/:id"
                body: Stack {
                  Heading { "Product", level: 1 },
                  QueryView {
                    of:      Shop.Product.byId(id),
                    single:  true,
                    loading: Text { "Loading…" },
                    error:   Text { "Failed to load" },
                    empty:   Text { "Product not found." },
                    data:    p => Card { p.name,
                      Text { p.price }
                    }
                  },
                  OperationForm { of: Product, op: rename },
                  DestroyForm { of: Product },
                  Button { "Back to products", to: "/products" }
                }
              }
            }

            deployable api { platform: node contexts: [Cat] dataSources: [catState] serves: ShopApi port: 3000 }
            deployable web { platform: feliz targets: api ui: WebApp { Shop: api } port: 3005 }
          }
          DDD
          node bin/cli.js generate system ci-feliz/showcase.ddd -o ci-feliz/out
      - name: Locate the emitted Feliz project
        id: proj
        run: echo "dir=$(dirname "$(find ci-feliz/out -name App.fsproj | head -1)")" >> "$GITHUB_OUTPUT"
      - name: Fable compile (F# → JS)
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          dotnet tool restore
          dotnet fable App.fsproj -o out --extension .js
      - name: Vite build the bundle
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          npm install
          npx vite build
      # Runtime e2e — the build gate above proves the bundle COMPILES; this
      # proves it RUNS.  Serve the static bundle with `vite preview` and drive it
      # in headless Chromium: the app mounts, the MVU counter dispatches, routing
      # navigates, and the wire layer's Remote state settles (no backend → the
      # QueryView shows its error/empty branch, which itself proves the Cmd +
      # Thoth-decoder path executed).  Pure client-side, so no db sidecar.
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Serve the bundle + run the runtime smoke
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          npx vite preview --port 4173 --strictPort &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173/ >/dev/null && break
            sleep 1
          done
          SMOKE_URL=http://localhost:4173/ node "$GITHUB_WORKSPACE/scripts/feliz-smoke.mjs"

      # Scaffold parity — the hand-built showcase above exercises the MVU/wire
      # paths; this proves a `with scaffold(...)`-generated app (List/New/Detail/
      # Home built from Table/Toolbar/Breadcrumbs/Paper/IdLink/Alert/… primitives)
      # also compiles AND runs — e2e parity with the JSX frontends' scaffold
      # examples.  Reuses the same toolchain + Playwright install.
      - name: Generate the scaffold parity app
        run: |
          cat > ci-feliz/scaffold.ddd <<'DDD'
          system Storefront {
            api ShopApi from Catalog
            subdomain Catalog {
              context Cat {
                aggregate Product with crudish {
                  name:  string
                  price: money
                }
                repository Products for Product { }
              }
            }
            storage db { type: postgres }
            resource catState { for: Cat, kind: state, use: db }
            ui WebApp with scaffold(aggregates: [Product]) {
              api Shop: ShopApi
            }
            deployable api { platform: node contexts: [Cat] dataSources: [catState] serves: ShopApi port: 3000 }
            deployable web { platform: feliz targets: api ui: WebApp { Shop: api } port: 3005 }
          }
          DDD
          node bin/cli.js generate system ci-feliz/scaffold.ddd -o ci-feliz/scaffold-out
      - name: Locate the scaffold project
        id: sproj
        run: echo "dir=$(dirname "$(find ci-feliz/scaffold-out -name App.fsproj | head -1)")" >> "$GITHUB_OUTPUT"
      - name: Fable compile + vite build + runtime smoke (scaffold)
        working-directory: ${{ steps.sproj.outputs.dir }}
        run: |
          dotnet tool restore
          dotnet fable App.fsproj -o out --extension .js
          npm install
          npx vite build
          npx vite preview --port 4175 --strictPort &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:4175/ >/dev/null && break
            sleep 1
          done
          SMOKE_URL=http://localhost:4175/ node "$GITHUB_WORKSPACE/scripts/feliz-scaffold-smoke.mjs"
