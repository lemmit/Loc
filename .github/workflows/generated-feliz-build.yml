name: Generated Feliz build

# Generate the Feliz (Fable/F#/Elmish) frontend from a .ddd, then prove the
# emitted F# compiles via `dotnet fable` and bundles via `vite build` ‚Äî the
# analogue of generated-react-build.yml (which tscs the emitted TSX) ‚Äî AND that
# the bundle actually RUNS: a `vite preview` + headless-Chromium smoke drives the
# MVU loop, routing, and the wire layer's Remote state (the runtime sibling the
# other frontends get from generated-{vue,svelte}-e2e.yml, folded in here to
# reuse the single slow `dotnet fable` step).  Catches generator drift that
# lowers cleanly to IR but emits non-compiling / non-running F# ‚Äî invisible to
# the fast vitest suite.
#
# One cell (the full CRUD showcase, inline below); grows example-by-example as
# the procedural pack does.  The .ddd is embedded here (not under examples/) so
# the other example-globbing gates never pick up a feliz-only source.

on:
  push:
    branches: [main]
    paths:
      - 'src/generator/feliz/**'
      - 'src/generator/_walker/**'
      - 'src/platform/feliz.ts'
      - 'src/platform/metadata.ts'
      - 'src/platform/registry.ts'
      - 'src/language/ddd.langium'
      - 'scripts/feliz-smoke.mjs'
      - 'scripts/feliz-scaffold-smoke.mjs'
      - 'scripts/feliz-authgate-smoke.mjs'
      - '.github/workflows/generated-feliz-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/generator/feliz/**'
      - 'src/generator/_walker/**'
      - 'src/platform/feliz.ts'
      - 'src/platform/metadata.ts'
      - 'src/platform/registry.ts'
      - 'src/language/ddd.langium'
      - 'scripts/feliz-smoke.mjs'
      - 'scripts/feliz-scaffold-smoke.mjs'
      - 'scripts/feliz-authgate-smoke.mjs'
      - '.github/workflows/generated-feliz-build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  feliz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install + build the toolchain
        run: npm ci
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - name: Generate the Feliz showcase system
        run: |
          mkdir -p ci-feliz
          # Four-page routed app ‚Äî exercises multi-page routing (Page union +
          # parseUrl + React.router + Router.navigate) ALONGSIDE the wire layer
          # (Thoth decoders + Cmd-based Api + the Remote/QueryView MVU
          # projection ‚Äî BOTH list `.all` and byId detail reads), the MVU counter
          # (state + action ‚Üí dispatch), and the pack primitives
          # (Heading/Badge/Text/Button/Divider/Card + For).  The ProductDetail
          # page covers byId-on-navigation: a `:id` route ‚Üí a `Remote<T option>`
          # fired via `pageCmd` on entry, rendered through `View.remoteOne`, plus
          # a `DestroyForm` (delete) ‚Üí a mutation Cmd + navigate-on-success and an
          # `OperationForm` (a custom `rename` op) ‚Üí an id-qualified POST to
          # /{id}/rename.  The ProductNew page covers a `CreateForm` ‚Üí Thoth
          # encoders + Elmish form state (inputs ‚Üí Set Msgs) + a POST Cmd, with
          # TYPED inputs (a `type: number` price, a `bool` inStock checkbox, an
          # `enum Status` <select>, a foreign-key `Category id?` <select> populated
          # from an implicit `Category.all` read via `View.idOptions`, a value-object
          # `Contact` flattened into `contactEmail`/`contactPhone` inputs re-nested
          # in the encoder, a scalar-array `tags: string[]?` comma-separated input
          # split into a JSON array, an OPTIONAL `note` ‚Äî empty ‚Üí null, exempt) and
          # a `Validation`-gated submit the smoke drives (disabled ‚Üí fill ‚Üí enabled).
          cat > ci-feliz/showcase.ddd <<'DDD'
          system Storefront {
            api ShopApi from Catalog

            subdomain Catalog {
              context Cat {
                enum Status { active inactive archived }
                valueobject Contact { email: string?  phone: string? }
                aggregate Category with crudish {
                  name: string
                  derived display: string = name
                }
                repository Categories for Category { }
                error ProductUnavailable { sku: string }
                aggregate Product with crudish {
                  name:     string
                  price:    money
                  inStock:  bool
                  note:     string?
                  status:   Status
                  category: Category id?
                  contact:  Contact
                  tags:     string[]?
                  operation rename(newName: string) { name := newName }
                  // Union-returning instance op driving a `match await` async
                  // effect on the detail page (M-T6.15).
                  operation reserve(): Product or ProductUnavailable {
                    return ProductUnavailable { sku: name }
                  }
                }
                repository Products for Product { }
              }
            }

            storage db { type: postgres }
            resource catState { for: Cat, kind: state, use: db }

            ui WebApp {
              api Shop: ShopApi
              page Home {
                route: "/"
                state { count: int = 0 }
                action inc() { count := count + 1 }
                body: Stack {
                  Heading { "Storefront", level: 1 },
                  Badge { "beta" },
                  Text { "Clicks: " + count },
                  Button { "+", onClick: inc },
                  Divider { },
                  Button { "Browse products", to: "/products" }
                }
              }
              page Products {
                route: "/products"
                body: Stack {
                  Heading { "Products", level: 1 },
                  QueryView {
                    of:      Shop.Product.all,
                    loading: Text { "Loading‚Ä¶" },
                    error:   Text { "Failed to load" },
                    empty:   Text { "No products yet." },
                    data:    rows => Stack {
                      For { each: rows, p => Card { p.name,
                        Text { p.price }
                      } }
                    }
                  },
                  Button { "Add a product", to: "/products/new" },
                  Button { "Back home", to: "/" }
                }
              }
              page ProductNew {
                route: "/products/new"
                body: Stack {
                  Heading { "New product", level: 1 },
                  CreateForm { of: Product },
                  Button { "Cancel", to: "/products" }
                }
              }
              page ProductDetail {
                route: "/products/:id"
                state { reserveMsg: string = "idle" }
                // `match await` async effect (M-T6.15): the trigger carries the
                // route id, the result reduces the op's tagged union to page
                // state ‚Äî the success arm binds the Product, the else handles
                // the non-success outcome (and, with no backend, the thrown/
                // non-2xx path the runtime smoke exercises ‚Üí "unavailable").
                action reserveNow() {
                  match await Shop.Product.reserve() {
                    Product p => { reserveMsg := p.name }
                    else      => { reserveMsg := "unavailable" }
                  }
                }
                body: Stack {
                  Heading { "Product", level: 1 },
                  QueryView {
                    of:      Shop.Product.byId(id),
                    single:  true,
                    loading: Text { "Loading‚Ä¶" },
                    error:   Text { "Failed to load" },
                    empty:   Text { "Product not found." },
                    data:    p => Card { p.name,
                      Text { p.price }
                    }
                  },
                  Text { "Reserve: " + reserveMsg },
                  Button { "Reserve", onClick: reserveNow },
                  OperationForm { of: Product, op: rename },
                  DestroyForm { of: Product },
                  Button { "Back to products", to: "/products" }
                }
              }
            }

            deployable api { platform: node contexts: [Cat] dataSources: [catState] serves: ShopApi port: 3000 }
            deployable web { platform: feliz targets: api ui: WebApp { Shop: api } port: 3005 }
          }
          DDD
          node bin/cli.js generate system ci-feliz/showcase.ddd -o ci-feliz/out
      - name: Locate the emitted Feliz project
        id: proj
        run: echo "dir=$(dirname "$(find ci-feliz/out -name App.fsproj | head -1)")" >> "$GITHUB_OUTPUT"
      - name: Fable compile (F# ‚Üí JS)
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          dotnet tool restore
          dotnet fable App.fsproj -o out --extension .js
      - name: Vite build the bundle
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          npm install
          npx vite build
      # Runtime e2e ‚Äî the build gate above proves the bundle COMPILES; this
      # proves it RUNS.  Serve the static bundle with `vite preview` and drive it
      # in headless Chromium: the app mounts, the MVU counter dispatches, routing
      # navigates, the wire layer's Remote state settles (no backend ‚Üí the
      # QueryView shows its error/empty branch, which itself proves the Cmd +
      # Thoth-decoder path executed), and the detail page's `match await` async
      # effect flips page state via the trigger‚ÜíCmd.OfAsync‚Üíresult projection
      # (M-T6.15).  Pure client-side, so no db sidecar.
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Serve the bundle + run the runtime smoke
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          npx vite preview --port 4173 --strictPort &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173/ >/dev/null && break
            sleep 1
          done
          SMOKE_URL=http://localhost:4173/ node "$GITHUB_WORKSPACE/scripts/feliz-smoke.mjs"

      # Scaffold parity ‚Äî the hand-built showcase above exercises the MVU/wire
      # paths; this proves a `with scaffold(...)`-generated app (List/New/Detail/
      # Home built from Table/Toolbar/Breadcrumbs/Paper/IdLink/Alert/‚Ä¶ primitives,
      # PLUS a WorkflowForm from `workflows:`) also compiles AND runs ‚Äî e2e parity
      # with the JSX frontends' scaffold examples.  Wrapped in the AUTH GATE
      # (`user{}` + `auth: required`/`auth: ui`): the session probe resolves and
      # the gated app renders (preview's SPA fallback answers /auth/me).  Reuses
      # the same toolchain + Playwright install.
      - name: Generate the scaffold parity app
        run: |
          cat > ci-feliz/scaffold.ddd <<'DDD'
          system Storefront {
            user { id: string  role: string }
            api ShopApi from Catalog
            subdomain Catalog {
              context Cat {
                valueobject Tag { label: string  weight: int }
                aggregate Product with crudish {
                  name:  string
                  price: money
                  tags:  Tag[]
                  operation rename(newName: string) { name := newName }
                }
                repository Products for Product { }
                workflow restock transactional {
                  create(sku: string, qty: int) {
                    precondition qty > 0
                    let p = Product.create(name: sku, price: 0)
                  }
                }
              }
            }
            storage db { type: postgres }
            resource catState { for: Cat, kind: state, use: db }
            ui WebApp with scaffold(aggregates: [Product], workflows: [restock]) {
              api Shop: ShopApi
            }
            deployable api { platform: node contexts: [Cat] dataSources: [catState] serves: ShopApi port: 3000 auth: required }
            deployable web { platform: feliz targets: api ui: WebApp { Shop: api } port: 3005 auth: ui }
          }
          DDD
          node bin/cli.js generate system ci-feliz/scaffold.ddd -o ci-feliz/scaffold-out
      - name: Locate the scaffold project
        id: sproj
        run: echo "dir=$(dirname "$(find ci-feliz/scaffold-out -name App.fsproj | head -1)")" >> "$GITHUB_OUTPUT"
      - name: Fable compile + vite build + runtime smoke (scaffold)
        working-directory: ${{ steps.sproj.outputs.dir }}
        run: |
          dotnet tool restore
          dotnet fable App.fsproj -o out --extension .js
          npm install
          npx vite build
          npx vite preview --port 4175 --strictPort &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:4175/ >/dev/null && break
            sleep 1
          done
          SMOKE_URL=http://localhost:4175/ node "$GITHUB_WORKSPACE/scripts/feliz-scaffold-smoke.mjs"

      # Third leg: the UI AUTHORIZATION GATE (D-AUTH-OIDC).  A page carrying
      # `requires currentUser.role == "admin"` decodes the verified session
      # claims (`/api/auth/me` ‚Üí a typed `CurrentUser` record via Thoth) and
      # wraps the gated view in a `Some currentUser when <gate> -> ‚Ä¶ | _ ->
      # forbiddenView` guard ‚Äî the client mirror of the backend 403.  The smoke
      # STUBS `/api/auth/me` (Playwright request interception) so BOTH branches
      # run for real: admin claims ‚Üí the gated body renders; viewer claims ‚Üí
      # forbiddenView.  (The scaffold leg above stays gate-free, so it keeps its
      # SPA-fallback probe; the claims decode needs a JSON body, hence the stub.)
      - name: Generate the auth-gate app
        run: |
          cat > ci-feliz/authgate.ddd <<'DDD'
          system GateShop {
            user { id: string  role: string }
            api ShopApi from Catalog
            subdomain Catalog {
              context Cat {
                aggregate Product {
                  name:   string
                  price:  money
                  active: bool
                  operation activate() { requires currentUser.role == "admin"  active := true }
                }
                repository Products for Product { }
              }
            }
            storage db { type: postgres }
            resource catState { for: Cat, kind: state, use: db }
            ui WebApp {
              api Shop: ShopApi
              page Home { route: "/"  body: Heading { "Welcome", level: 1 } }
              page Admin {
                route: "/admin"
                requires currentUser.role == "admin"
                body: Heading { "Admin Console", level: 1 }
              }
              // A gated ONE-CLICK action: the byId detail hosts Action { p.activate },
              // whose op requires currentUser.role == "admin" ‚Äî a native F# dispatch
              // (POST /{id}/activate) hidden from non-admins via the decoded claims.
              // Proves the Action primitive + action-button gating.
              page ProductDetail {
                route: "/products/:id"
                body: QueryView {
                  of: Shop.Product.byId(id), single: true,
                  loading: Text { "Loading‚Ä¶" }, error: Text { "err" }, empty: Text { "none" },
                  data: p => Stack {
                    Heading { p.name, level: 1 },
                    Action { p.activate }
                  }
                }
              }
            }
            deployable api { platform: node contexts: [Cat] dataSources: [catState] serves: ShopApi port: 3000 auth: required }
            deployable web { platform: feliz targets: api ui: WebApp { Shop: api } port: 3005 auth: ui }
          }
          DDD
          node bin/cli.js generate system ci-feliz/authgate.ddd -o ci-feliz/authgate-out
      - name: Locate the auth-gate project
        id: gproj
        run: echo "dir=$(dirname "$(find ci-feliz/authgate-out -name App.fsproj | head -1)")" >> "$GITHUB_OUTPUT"
      - name: Fable compile + vite build + runtime smoke (auth gate)
        working-directory: ${{ steps.gproj.outputs.dir }}
        run: |
          dotnet tool restore
          dotnet fable App.fsproj -o out --extension .js
          npm install
          npx vite build
          npx vite preview --port 4176 --strictPort &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -sf http://localhost:4176/ >/dev/null && break
            sleep 1
          done
          SMOKE_URL=http://localhost:4176/ node "$GITHUB_WORKSPACE/scripts/feliz-authgate-smoke.mjs"
