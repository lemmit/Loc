name: Elixir / Vanilla build verification

# For every fixture under `test/e2e/fixtures/elixir-vanilla-build/`,
# generate the project then `mix deps.get && mix compile
# --warnings-as-errors` inside the hexpm/elixir Docker image.  This is
# the acceptance gate for the `foundation: vanilla` emit subtree —
# Slice 6 of docs/old/plans/vanilla-foundation-tdd-plan.md.  Catches every
# Elixir-side error the unit-test string-assertion layer can't see.
#
# The generate + compile loop lives in
# `test/e2e/generated-elixir-vanilla-build.test.ts` (entrypoint:
# `npm run test:phoenix-vanilla`).  A `configure` job enumerates the
# fixtures dynamically, then a matrix runs ONE fixture per cell
# (selected via `LOOM_PHOENIX_VANILLA_BUILD_CASE`): each cell
# pre-generates to compute its own deps-cache signature, restores its
# per-fixture cache, then hands off to the test (which honours
# `LOOM_PHOENIX_OUT_DIR` and skips regeneration when mix.exs already
# exists).  Sharding keeps a cold cache self-healing — see the job
# comment below.
#
# The Elixir-foundation compile gate, sharded (#1367): the old single
# job compiled all ~14
# fixtures sequentially behind one shared cache, so a fully-cold run
# (after the 7-day cache eviction) couldn't finish in the timeout, got
# cancelled, and never reseeded the cache — staying red until a
# maintainer intervened.
#
# Triggers:
#   - PRs that touch the vanilla generator subtree, the fixtures, or
#     the test.
#   - Pushes to main.
#   - Manual dispatch.

on:
  push:
    branches: [main]
    paths:
      # Whole elixir generator subtree — render-expr.ts, domain/, heex-*,
      # AND vanilla/ — not just vanilla/ + index.ts (audit A6.1: this was
      # the narrowest backend gate, blind to its own render-expr/heex code).
      - 'src/generator/elixir/**'
      # Shared expression-renderer seam every domain-logic backend consumes.
      - 'src/generator/_expr/**'
      # Platform-neutral IR the elixir backend lowers from — an IR change
      # can break the elixir emit while every string-assert unit test passes.
      - 'src/ir/**'
      - 'src/platform/elixir.ts'
      - 'src/language/validators/deployable.ts'
      - 'test/e2e/fixtures/elixir-vanilla-build/**'
      - 'test/e2e/generated-elixir-vanilla-build.test.ts'
      - 'package.json'
      - '.github/workflows/elixir-vanilla-build.yml'
  pull_request:
    paths:
      - 'src/generator/elixir/**'
      - 'src/generator/_expr/**'
      - 'src/ir/**'
      - 'src/platform/elixir.ts'
      - 'src/language/validators/deployable.ts'
      - 'test/e2e/fixtures/elixir-vanilla-build/**'
      - 'test/e2e/generated-elixir-vanilla-build.test.ts'
      - 'package.json'
      - '.github/workflows/elixir-vanilla-build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Enumerate the fixtures dynamically so adding/removing a `.ddd` under
  # test/e2e/fixtures/elixir-vanilla-build/ needs no workflow edit.  Output is
  # JSON consumed by the matrix below via `fromJSON`.  ~5s of runner time.
  configure:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set
        run: |
          fixtures=$(ls test/e2e/fixtures/elixir-vanilla-build/*.ddd \
            | xargs -n1 basename | sed 's/\.ddd$//' | jq -R . | jq -cs .)
          echo "matrix={\"fixture\":$fixtures}" >> "$GITHUB_OUTPUT"

  # One job PER fixture (sharded, #1367).  A
  # fully cold cell is ONE fixture (~2-3min) — it always completes within the
  # timeout and reseeds its own per-fixture cache, so a cold cache self-heals.
  build-generated-elixir-vanilla:
    needs: configure
    runs-on: ubuntu-latest
    strategy:
      # Surface every broken fixture rather than aborting on the first.
      fail-fast: false
      matrix: ${{ fromJSON(needs.configure.outputs.matrix) }}
    timeout-minutes: 15
    name: ${{ matrix.fixture }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # `npm ci` runs the `prepare` lifecycle (langium:generate +
      # build); the toolchain compiles before any test step needs it.
      - name: Install Loom toolchain
        run: npm ci

      # Pre-generate THIS fixture into a stable path so we can hash the
      # emitted mix.exs for the cache key.  Vanilla fixtures emit to
      # `<deployable>/` (e.g. `api/`) — so the cache globs `*/out/*/`.
      - name: Pre-generate fixture (for cache key)
        run: |
          mkdir -p "/tmp/ci/vanilla/${{ matrix.fixture }}/out"
          node bin/cli.js generate system \
            "test/e2e/fixtures/elixir-vanilla-build/${{ matrix.fixture }}.ddd" \
            -o "/tmp/ci/vanilla/${{ matrix.fixture }}/out"

      - name: Compute vanilla dep signature
        id: vanilla-depsig
        run: |
          hash=$(find "/tmp/ci/vanilla/${{ matrix.fixture }}" -name mix.exs -print0 \
            | xargs -0 cat | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Cache vanilla deps + _build
        uses: actions/cache@v5
        with:
          path: |
            /tmp/ci/vanilla/${{ matrix.fixture }}/out/*/deps
            /tmp/ci/vanilla/${{ matrix.fixture }}/out/*/_build
          key: vanilla-mix-${{ matrix.fixture }}-${{ steps.vanilla-depsig.outputs.hash }}
          # On cache miss (mix.exs changed), fall back to this fixture's most
          # recent stale cache so mix only re-fetches/-compiles deltas.
          restore-keys: |
            vanilla-mix-${{ matrix.fixture }}-

      - name: Run test:phoenix-vanilla (this fixture)
        env:
          LOOM_PHOENIX_VANILLA_BUILD: "1"
          LOOM_PHOENIX_OUT_DIR: /tmp/ci/vanilla
          LOOM_PHOENIX_VANILLA_BUILD_CASE: ${{ matrix.fixture }}.ddd
        run: npx vitest run test/e2e/generated-elixir-vanilla-build.test.ts

      - name: Surface failure context
        if: failure()
        run: |
          echo "## Elixir / Vanilla mix compile failed: ${{ matrix.fixture }}.ddd" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the "Run test:phoenix-vanilla" step above for the captured `mix deps.get` + `mix compile --warnings-as-errors` diagnostics.' >> $GITHUB_STEP_SUMMARY
          echo 'This cell builds `test/e2e/fixtures/elixir-vanilla-build/${{ matrix.fixture }}.ddd` via its `it.each` iteration in `test/e2e/generated-elixir-vanilla-build.test.ts`.' >> $GITHUB_STEP_SUMMARY
