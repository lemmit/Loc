name: Elixir / Ash build verification

# For every fixture under `test/e2e/fixtures/elixir-ash-build/`, generate
# a Phoenix project then `mix deps.get && mix compile --warnings-as-errors`
# inside the hexpm/elixir Docker image.  Catches Ash 3.x API drift,
# OpenApiSpex schema mismatches, join-table emission bugs, and any
# other emission that only surfaces when the generated source
# actually compiles.
#
# The actual generate + compile loop lives in
# `test/e2e/generated-elixir-ash-build.test.ts` (entrypoint:
# `npm run test:phoenix`).  A `configure` job enumerates the fixtures
# dynamically, then a matrix runs ONE fixture per cell (selected via
# `LOOM_PHOENIX_BUILD_CASE`): each cell pre-generates to compute its
# own deps-cache signature, restores its per-fixture cache, then hands
# off to the test (which honours `LOOM_PHOENIX_OUT_DIR` and skips
# regeneration when the project is already on disk).  Sharding keeps a
# cold cache self-healing — see the job comment below.  Both the
# workflow and the test read the same fixture files, so language-feature
# additions no longer need a separate workflow-side update.
#
# Triggers:
#   - PRs that touch the Phoenix generator, the HEEx design packs,
#     the fixtures, or the test.
#   - Pushes to main (full regression check).
#   - Manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - 'src/generator/elixir/**'
      - 'src/platform/elixir.ts'
      - 'designs/coreComponents/**'
      - 'designs/daisyui/**'
      - 'examples/**'
      - 'test/e2e/fixtures/elixir-ash-build/**'
      - 'test/e2e/generated-elixir-ash-build.test.ts'
      - 'package.json'
      - '.github/workflows/elixir-ash-build.yml'
  pull_request:
    paths:
      - 'src/generator/elixir/**'
      - 'src/platform/elixir.ts'
      - 'designs/coreComponents/**'
      - 'designs/daisyui/**'
      - 'examples/**'
      - 'test/e2e/fixtures/elixir-ash-build/**'
      - 'test/e2e/generated-elixir-ash-build.test.ts'
      - 'package.json'
      - '.github/workflows/elixir-ash-build.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-flight runs of the same branch when a new commit lands —
# saves CI minutes on rebases / force-pushes (mirrors the pattern in
# test.yml / playground-e2e.yml / generated-react-build.yml).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Enumerate the fixtures dynamically so adding/removing a `.ddd` under
  # test/e2e/fixtures/elixir-ash-build/ needs no workflow edit (the fixtures
  # dir stays the single source of truth, as before).  Output is JSON
  # consumed by the matrix below via `fromJSON`.  ~5s of runner time.
  configure:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set
        run: |
          fixtures=$(ls test/e2e/fixtures/elixir-ash-build/*.ddd \
            | xargs -n1 basename | sed 's/\.ddd$//' | jq -R . | jq -cs .)
          echo "matrix={\"fixture\":$fixtures}" >> "$GITHUB_OUTPUT"

  # One job PER fixture (mirrors the react/svelte/vue *_CASE sharding).
  # The old single job compiled all ~17 fixtures sequentially; a fully
  # cold run (after the 7-day cache eviction) couldn't finish in the
  # timeout, so it could never reseed the cache and stayed red.  Sharded,
  # each cell's cold path is ONE fixture (~4-6min) — it always completes
  # and reseeds its own per-fixture cache, so a cold cache self-heals.
  build-generated-elixir-ash:
    needs: configure
    runs-on: ubuntu-latest
    strategy:
      # Surface every broken fixture rather than aborting on the first.
      fail-fast: false
      matrix: ${{ fromJSON(needs.configure.outputs.matrix) }}
    # One fixture: cold deps.get + full mix compile ~4-6min, plus npm ci
    # + generate; 15min leaves ample headroom on a slow runner.  Each
    # cell runs on its own runner so total wall time ≈ one fixture, not
    # their sum.  (The heavier showcase compiles in its own job below.)
    timeout-minutes: 15
    name: ${{ matrix.fixture }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # `npm ci` runs the `prepare` lifecycle (langium:generate +
      # build) which populates src/language/generated/.  No need for a
      # separate `npm run build` step — `prepare` does it.
      - name: Install Loom toolchain
        run: npm ci

      # Pre-generate THIS fixture into a stable path so we can hash the
      # emitted mix.exs for the cache key.  Cheap (~1s, no docker, no hex
      # fetch).  The test step honours `LOOM_PHOENIX_OUT_DIR` and re-uses
      # this tree (skipping its own regeneration when `mix.exs` already
      # exists), so the docker `mix compile` runs against THIS source
      # with deps restored from the cache.
      - name: Pre-generate fixture (for cache key)
        run: |
          mkdir -p "/tmp/ci/phoenix/${{ matrix.fixture }}/out"
          node bin/cli.js generate system \
            "test/e2e/fixtures/elixir-ash-build/${{ matrix.fixture }}.ddd" \
            -o "/tmp/ci/phoenix/${{ matrix.fixture }}/out"

      # The dep set only changes when the emitted mix.exs changes, so we
      # sign the per-fixture cache key on that fixture's mix.exs hash.
      - name: Compute Phoenix dep signature
        id: phoenix-depsig
        run: |
          hash=$(sha256sum "/tmp/ci/phoenix/${{ matrix.fixture }}/out/phoenix_app/mix.exs" | cut -d' ' -f1)
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Cache Phoenix deps + _build
        uses: actions/cache@v5
        with:
          path: |
            /tmp/ci/phoenix/${{ matrix.fixture }}/out/phoenix_app/deps
            /tmp/ci/phoenix/${{ matrix.fixture }}/out/phoenix_app/_build
          key: phoenix-mix-${{ matrix.fixture }}-${{ steps.phoenix-depsig.outputs.hash }}
          # On cache miss (mix.exs changed), fall back to this fixture's
          # most recent stale cache so mix only re-fetches/-compiles
          # deltas instead of the full ~3-4min cold dep set.
          restore-keys: |
            phoenix-mix-${{ matrix.fixture }}-

      # Hand off to the test — `LOOM_PHOENIX_BUILD_CASE` selects this one
      # fixture's `it.each` iteration, which spawns `docker run mix
      # compile --warnings-as-errors` and surfaces failures via vitest's
      # reporter into the job log (captured via `stdio: "inherit"`).
      - name: Run test:phoenix (this fixture)
        env:
          LOOM_PHOENIX_OUT_DIR: /tmp/ci/phoenix
          LOOM_PHOENIX_BUILD_CASE: ${{ matrix.fixture }}.ddd
        run: npm run test:phoenix

      # Mirrors dotnet-obs-e2e.yml's failure-context pattern — point
      # readers at the captured docker / mix output that vitest
      # already printed to the job log via stdio: inherit.
      - name: Surface failure context
        if: failure()
        run: |
          echo "## Phoenix mix compile failed: ${{ matrix.fixture }}.ddd" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the "Run test:phoenix" step above for the captured `mix deps.get` + `mix compile --warnings-as-errors` diagnostics.' >> $GITHUB_STEP_SUMMARY
          echo 'This cell builds `test/e2e/fixtures/elixir-ash-build/${{ matrix.fixture }}.ddd` via its `it.each` iteration in `test/e2e/generated-elixir-ash-build.test.ts`.' >> $GITHUB_STEP_SUMMARY

  # The showcase is the maximal multi-context, multi-deployable example.
  # Generating its full system + compiling the phoenix_api deployable is
  # markedly heavier than any single fixture, and its deps live under a
  # distinct path (`phoenix_api`, not the fixtures' `phoenix_app`) with a
  # cache key of its own.  Run it in a SEPARATE job so it executes in
  # parallel with the fixtures job instead of stacking onto that job's
  # sequential `docker run` legs (which blew the fixtures job's timeout
  # when appended there).  Gated behind LOOM_PHOENIX_SHOWCASE so the
  # fixtures job's `npm run test:phoenix` skips the standalone case.
  build-generated-elixir-ash-showcase:
    runs-on: ubuntu-latest
    # The showcase phoenix_api is a large multi-context Ash app; a cold
    # run (deps.get + first full compile, before the cache is seeded) is
    # the worst case here.  20min keeps a hung job bounded while leaving
    # room for that cold path; warm runs (cache restored) are ~5min.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Loom toolchain
        run: npm ci

      # Pre-generate the showcase once into a stable path so we can hash
      # the emitted mix.exs for the cache key.  The test step honours
      # LOOM_PHOENIX_OUT_DIR/showcase/out and skips its own regeneration
      # when mix.exs already exists there.
      - name: Pre-generate showcase (for cache key)
        run: |
          mkdir -p /tmp/ci/phoenix/showcase/out
          node bin/cli.js generate system examples/showcase.ddd -o /tmp/ci/phoenix/showcase/out

      - name: Compute showcase dep signature
        id: showcase-depsig
        run: |
          hash=$(sha256sum /tmp/ci/phoenix/showcase/out/phoenix_api/mix.exs | cut -d' ' -f1)
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Cache showcase deps + _build
        uses: actions/cache@v5
        with:
          path: |
            /tmp/ci/phoenix/showcase/out/phoenix_api/deps
            /tmp/ci/phoenix/showcase/out/phoenix_api/_build
          key: phoenix-showcase-mix-${{ steps.showcase-depsig.outputs.hash }}
          restore-keys: |
            phoenix-showcase-mix-

      # Run only the standalone showcase case (`-t showcase`).  Both
      # LOOM_PHOENIX_BUILD (enables the describe block) and
      # LOOM_PHOENIX_SHOWCASE (un-skips the showcase `it`) are set.
      - name: Run showcase phoenix build (mix compile --warnings-as-errors)
        env:
          LOOM_PHOENIX_BUILD: '1'
          LOOM_PHOENIX_SHOWCASE: '1'
          LOOM_PHOENIX_OUT_DIR: /tmp/ci/phoenix
        run: npx vitest run test/e2e/generated-elixir-ash-build.test.ts -t showcase

      - name: Surface failure context
        if: failure()
        run: |
          echo '## Phoenix showcase mix compile failed' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the "Run showcase phoenix build" step above for the captured `mix deps.get` + `mix compile --warnings-as-errors` diagnostics for the showcase `phoenix_api` deployable.' >> $GITHUB_STEP_SUMMARY
