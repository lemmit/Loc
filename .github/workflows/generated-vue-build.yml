name: Generated Vue build

# For each {case × vue pack} cell, generate the Vue project,
# `npm install`, `vue-tsc --noEmit`, and `vite build` it.  The Vue
# analogue of generated-react-build.yml — catches generator/pack
# drift invisible to the IR-level tests (vue-frontend-plan.md
# Slice 9).
#
# Matrix policy:
#   - pull_request    → 4 cells: the showcase + store cases × both packs.
#   - push: main /    → full 8-cell Cartesian
#     workflow_dispatch  ({minimal, scaffold, showcase, store} × packs).
#
# Cell names MUST match the case labels in
# test/e2e/generated-vue-build.test.ts (`<case>:<pack>`).

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'designs/vuetify/**'
      - 'designs/shadcnVue/**'
      - 'examples/vue-showcase.ddd'
      - 'web/src/examples/vue-store-showcase.ddd'
      - 'vue/**'
      - 'api/**'
      - 'docker/**'
      - 'stacks/vue1/**'
      - 'test/e2e/generated-vue-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/generated-vue-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'designs/vuetify/**'
      - 'designs/shadcnVue/**'
      - 'examples/vue-showcase.ddd'
      - 'web/src/examples/vue-store-showcase.ddd'
      - 'vue/**'
      - 'api/**'
      - 'docker/**'
      - 'stacks/vue1/**'
      - 'test/e2e/generated-vue-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/generated-vue-build.yml'
      # A change confined to a non-Vue backend cannot alter the Vue bundle —
      # skip this gate per-PR when only that code changed.  The push:main
      # trigger above keeps the broad `src/**` net post-merge.
      - '!src/generator/java/**'
      - '!src/generator/dotnet/**'
      - '!src/generator/python/**'
      - '!src/generator/elixir/**'
      - '!src/platform/java.ts'
      - '!src/platform/dotnet.ts'
      - '!src/platform/dotnet/**'
      - '!src/platform/python.ts'
      - '!src/platform/elixir.ts'
      - '!src/platform/hono/**'
      - '!src/platform/hono.ts'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  configure:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          PACKS='["vuetify@v3","shadcnVue@v1"]'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Slim PR slice: the two most representative cases (feature
            # showcase + the shared signal-store surface) × both packs.
            # `minimal`/`scaffold`/`file` drift is caught by the push:main
            # sweep below one merge later.
            CASES='["showcase","store"]'
          else
            CASES='["minimal","scaffold","showcase","store","file"]'
          fi
          echo "matrix={\"case\":$CASES,\"pack\":$PACKS}" >> "$GITHUB_OUTPUT"

  matrix:
    needs: configure
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.configure.outputs.matrix) }}
    timeout-minutes: 10
    name: ${{ matrix.case }} × ${{ matrix.pack }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Loom toolchain
        run: npm ci

      - name: Build toolchain
        run: npm run build

      - name: Run vue-build shard
        env:
          LOOM_VUE_BUILD_CASE: ${{ matrix.case }}:${{ matrix.pack }}
        run: npx vitest run test/e2e/generated-vue-build.test.ts
