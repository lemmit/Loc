name: Generated React TSX build

# Runs the slow `LOOM_REACT_BUILD=1` matrix: for each example .ddd
# file × each design pack (mantine / shadcn / mui / chakra), generate
# the React project, `npm install`, and `tsc --noEmit` it.  Catches
# generator drift that compiles the TS backend cleanly but breaks
# the generated TSX (missing imports, wrong prop types, JSX namespace
# issues) — invisible to the IR-level tests but breaks at user time.
#
# ~5min per run.  Opt-in locally via `LOOM_REACT_BUILD=1 npx vitest
# run test/generated-react-build.test.ts` so `npm test` stays fast.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'designs/**'
      - 'examples/**'
      - 'web/src/examples/**'
      - 'test/generated-react-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/generated-react-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'designs/**'
      - 'examples/**'
      - 'web/src/examples/**'
      - 'test/generated-react-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/generated-react-build.yml'
  workflow_dispatch:

concurrency:
  group: generated-react-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    runs-on: ubuntu-latest
    # The matrix runs 16 cases (4 examples × 4 packs) and each case
    # installs ~140 npm packages + runs tsc.  ~5min cumulative; 15
    # leaves headroom for npm registry slowness without letting a
    # hung run consume all the runner minutes.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Root install runs the `prepare` lifecycle which calls
      # `langium:generate` to produce src/language/generated/.
      - name: Install Loom toolchain
        run: npm ci

      - name: Build toolchain
        run: npm run build

      - name: Run tsc-react matrix
        run: LOOM_REACT_BUILD=1 npx vitest run test/generated-react-build.test.ts
