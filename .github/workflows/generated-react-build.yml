name: Generated React TSX build

# For each {example .ddd × design pack@version} cell, generate the React
# project, `npm install`, and `tsc --noEmit` it.  Catches generator
# drift that compiles the TS backend cleanly but breaks the generated
# TSX (missing imports, wrong prop types, JSX namespace issues) —
# invisible to the IR-level tests but breaks at user time.
#
# Matrix policy (configured by the `configure` job below):
#
#   - `pull_request` events    →  8-cell slice: showcase.ddd against
#                                  every pack@version.  showcase is
#                                  the feature-comprehensive
#                                  conformance fixture (#401) and
#                                  exercises the broadest generator
#                                  surface.  Misses per-example drift
#                                  (storybook-mantine / -shadcn,
#                                  loom-landing, banking, …) — caught
#                                  one merge later by:
#
#   - `push: main` /            →  full 88-cell Cartesian.  Heavy, but
#     `workflow_dispatch`           it's the regression safety net.
#                                   `workflow_dispatch` runs full too
#                                   so a maintainer can force the
#                                   sweep on a branch if a PR-time
#                                   slim cell smelled suspicious.
#
# Each cell runs as its own runner via a job matrix.  Wall time per
# cell is ~30s (npm install dominates); the full sweep completes in
# parallel rather than ~5min sequential.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'designs/**'
      - 'examples/**'
      - 'web/src/examples/**'
      - 'vite/**'
      - 'api/**'
      - 'docker/**'
      - 'test/e2e/generated-react-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/generated-react-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'designs/**'
      - 'examples/**'
      - 'web/src/examples/**'
      - 'vite/**'
      - 'api/**'
      - 'docker/**'
      - 'test/e2e/generated-react-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/generated-react-build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pick the matrix shape based on the event.  Output is JSON consumed
  # by the matrix job below via `fromJSON`.  Costs ~5 seconds of runner
  # time — negligible against the 88 cells we skip on a typical PR.
  configure:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          # Pack list is identical in both branches; declared once.
          PACKS='["mantine@v7","mantine@v9","shadcn@v3","shadcn@v4","mui@v5","mui@v7","chakra@v2","chakra@v3"]'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Slim PR slice — 8 cells.  showcase.ddd × every pack
            # family@version.  showcase is the feature-comprehensive
            # cross-generator conformance fixture (#401), so this
            # catches nearly all pack-template / generator drift.
            # Per-example drift on the other 10 examples is deferred
            # to the push:main sweep below.
            EXAMPLES='["examples/showcase.ddd"]'
          else
            # Full Cartesian — push:main and workflow_dispatch.  This
            # list MUST match the `examples` const in
            # test/e2e/generated-react-build.test.ts (pinned by the
            # "CI matrix ↔ examples list stay in sync" guard there).
            # Single-file examples only: the harness copies one .ddd to
            # a temp dir, so multi-file examples with `import "./…"`
            # (erp/main.ddd, fulfillment-newest.ddd) can't be built here
            # — their coverage lives in playground-feature-examples.
            EXAMPLES='["examples/acme.ddd","examples/showcase.ddd","web/src/examples/banking-system.ddd","web/src/examples/inventory-system.ddd","web/src/examples/provenance-system.ddd","web/src/examples/sales-system.ddd","web/src/examples/storefront-system.ddd","web/src/examples/inheritance-system.ddd","web/src/examples/storybook-mantine.ddd","web/src/examples/storybook-shadcn.ddd","web/src/examples/storybook-components.ddd","web/src/examples/loom-landing.ddd","web/src/examples/action-showcase.ddd","web/src/examples/store-showcase.ddd","web/src/examples/subform-showcase.ddd","web/src/examples/file-upload-system.ddd","web/src/examples/file-scaffold-system.ddd"]'
          fi
          echo "matrix={\"example\":$EXAMPLES,\"pack\":$PACKS}" >> "$GITHUB_OUTPUT"

  matrix:
    needs: configure
    runs-on: ubuntu-latest
    strategy:
      # Surface every broken cell rather than aborting the matrix on
      # the first red shard — easier to triage cross-pack regressions
      # when CI shows the full set.
      fail-fast: false
      matrix: ${{ fromJSON(needs.configure.outputs.matrix) }}
    # Per-shard timeout: generate + npm install + tsc fit comfortably
    # under 10min; the matrix gives every shard its own runner so the
    # total wall time is min(shard times) ≈ one shard, not their sum.
    timeout-minutes: 10
    name: ${{ matrix.example }} × ${{ matrix.pack }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Root install runs the `prepare` lifecycle which calls
      # `langium:generate` to produce src/language/generated/.
      - name: Install Loom toolchain
        run: npm ci

      - name: Build toolchain
        run: npm run build

      - name: Run tsc-react shard
        env:
          LOOM_REACT_BUILD_CASE: ${{ matrix.example }}:${{ matrix.pack }}
        run: npx vitest run test/e2e/generated-react-build.test.ts

  # Extern-component escape-hatch gate (not part of the example × pack
  # matrix): generate a project with an `extern` component, drop in a
  # hand-written widget, install + `tsc --noEmit`, and prove the typed
  # props contract bites — a correct widget compiles, a field-mismatch
  # one fails.  One runner, ~40s.
  extern-component:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: extern component props contract
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Loom toolchain
        run: npm ci

      - name: Build toolchain
        run: npm run build

      - name: Run extern-component build gate
        run: npm run test:tsc-react-extern
