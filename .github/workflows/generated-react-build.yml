name: Generated React TSX build

# For each example .ddd × each design pack (mantine / shadcn / mui /
# chakra), generate the React project, `npm install`, and
# `tsc --noEmit` it.  Catches generator drift that compiles the TS
# backend cleanly but breaks the generated TSX (missing imports,
# wrong prop types, JSX namespace issues) — invisible to the IR-
# level tests but breaks at user time.
#
# Each {example × pack} case runs as its own runner via a job matrix.
# Wall time per case is ~30s (npm install dominates); the full sweep
# completes in parallel rather than ~5min sequential.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'designs/**'
      - 'examples/**'
      - 'web/src/examples/**'
      - 'vite/**'
      - 'api/**'
      - 'docker/**'
      - 'test/generated-react-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/generated-react-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'designs/**'
      - 'examples/**'
      - 'web/src/examples/**'
      - 'vite/**'
      - 'api/**'
      - 'docker/**'
      - 'test/generated-react-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/generated-react-build.yml'
  workflow_dispatch:

concurrency:
  group: generated-react-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      # Surface every broken cell rather than aborting the matrix on
      # the first red shard — easier to triage cross-pack regressions
      # when CI shows the full set.
      fail-fast: false
      matrix:
        example:
          - examples/acme.ddd
          - web/src/examples/banking-system.ddd
          - web/src/examples/inventory-system.ddd
          - web/src/examples/sales-system.ddd
          - web/src/examples/storybook-mantine.ddd
          - web/src/examples/storybook-shadcn.ddd
          - web/src/examples/storybook-components.ddd
        pack: [mantine, shadcn, mui, chakra]
    # Per-shard timeout: generate + npm install + tsc fit comfortably
    # under 10min; the matrix gives every shard its own runner so the
    # total wall time is min(shard times) ≈ one shard, not their sum.
    timeout-minutes: 10
    name: ${{ matrix.example }} × ${{ matrix.pack }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Root install runs the `prepare` lifecycle which calls
      # `langium:generate` to produce src/language/generated/.
      - name: Install Loom toolchain
        run: npm ci

      - name: Build toolchain
        run: npm run build

      - name: Run tsc-react shard
        env:
          LOOM_REACT_BUILD_CASE: ${{ matrix.example }}:${{ matrix.pack }}
        run: npx vitest run test/generated-react-build.test.ts
