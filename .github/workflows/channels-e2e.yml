name: Channels (broker runtime e2e)

# Runtime e2e for cross-deployable broker eventing (channels.md, M-T4.4).
# 16 opt-in suites already exist under test/e2e/channels-e2e*.test.ts, each
# gated on its own LOOM_CHANNELS_E2E* env var with a matching `test:channels*`
# script in package.json — but until this workflow, NOTHING in CI ran any of
# them, so a broker-driver regression on any of the five backends could ship
# silently. This wires every one of the 16 scripts across three matrixed jobs
# (one per broker) plus the all-brokers-at-once auth leg:
#
#   redis      (broadcast/ephemeral) — node/python/dotnet/java/elixir
#   rabbitmq   (queue/work)          — node/python/dotnet/java/elixir
#   kafka      (broadcast/log)       — node/python/dotnet/java/elixir
#   auth       (all three at once)  — node only (M-T4.4 design §7)
#
# Each cell boots the GENERATED two-deployable system (producer salesApi +
# consumer shipApi, each with its own database) and proves the event crossed
# processes over the real broker — the runtime agreement the per-PR generator
# pins (test/generator/**/channels-*.test.ts) and the structural wiring
# validators (loom.channelsource-*, loom.channel-consumer-unwired) can't
# prove on their own.
#
# Sidecar strategy differs per broker, following each suite's own documented
# override knobs (LOOM_CHANNELS_PG_URL / _REDIS_URL / _AMQP_URL / _KAFKA_URL):
#   - postgres and redis (valkey) need no special boot incantation, so they
#     run as ordinary GitHub Actions `services:` containers (the email-e2e.yml
#     / tenancy-e2e.yml pattern) and the suites are pointed at them via the
#     PG/REDIS override envs.
#   - rabbitmq needs a cookie-permission preseed workaround under sandboxed
#     docker storage drivers (see channels-e2e-rabbit.test.ts), and kafka
#     needs a multi-listener KRaft config — both already scripted INSIDE the
#     suites via `docker run` (ubuntu-latest ships a running docker daemon).
#     Rather than duplicate that fragile setup as a `services:` block, these
#     legs only override LOOM_CHANNELS_PG_URL (postgres via `services:`) and
#     let the suite self-provision its own rabbitmq/kafka sidecar exactly as
#     it does locally. NOTE: this means the docker-only DLQ assertions inside
#     those suites still run here (no AMQP/KAFKA override is set) — nothing
#     is lost, this is the fullest-coverage path, just not the `services:`
#     pattern for those two brokers. Flagged for first-CI-run verification.
#   - the auth leg (test:channels-auth) provisions ALL THREE brokers itself
#     with GENERATED credentials/definitions mounted from the emitted
#     `docker-compose.yml` / `broker-init/` — it has no override knobs at all
#     (see channels-e2e-auth.test.ts), so it gets no `services:` block, just
#     postgres via `services:` for consistency with the other legs.
#
# Triggers `push: main` + manual dispatch + an on-demand `run-channels` label,
# NOT per-PR — the same docker-heavy-suite pattern as email-e2e.yml /
# tenancy-e2e.yml / elixir-vanilla-vo-e2e.yml (a broker boot on every
# channels-touching PR is a runner burst for a regression that's acceptable
# to catch one merge later; the structural + compile tiers already gate
# per-PR).
on:
  push:
    branches: [main]
    paths:
      - 'src/generator/_channels/**'
      - 'src/generator/typescript/emit/channels.ts'
      - 'src/generator/python/channels-builder.ts'
      - 'src/generator/dotnet/emit/channels.ts'
      - 'src/generator/java/emit/channels.ts'
      - 'src/generator/elixir/channels-emit.ts'
      - 'src/util/channels.ts'
      - 'src/language/validators/channel.ts'
      - 'src/ir/validate/checks/system-checks.ts'
      - 'src/ir/lower/lower-deployment.ts'
      - 'src/system/**'
      - 'test/e2e/channels-e2e*.test.ts'
      - 'test/fixtures/corpus/channels-broker.ddd'
      - 'package.json'
      - '.github/workflows/channels-e2e.yml'
  workflow_dispatch:
  # On-demand per-PR run: apply the `run-channels` label to a PR to run this
  # otherwise push:main-only suite against that branch before merge.
  pull_request:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # redis — broadcast/ephemeral, the Hono reference (M-T4.4 slice 2) plus
  # the four cross-backend legs. Postgres + valkey both run as plain
  # `services:` containers; the suites' own docker-sidecar path is skipped
  # entirely via the PG/REDIS URL overrides.
  # ---------------------------------------------------------------------
  channels-e2e-redis:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'run-channels'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: node
            script: test:channels
          - backend: python
            script: test:channels-python
          - backend: dotnet
            script: test:channels-dotnet
          - backend: java
            script: test:channels-java
          - backend: elixir
            script: test:channels-elixir
    name: channels-e2e-redis (${{ matrix.backend }})
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up uv (python)
        if: matrix.backend == 'python'
        uses: astral-sh/setup-uv@v7

      - name: Set up JDK (java)
        if: matrix.backend == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      # Java 25 toolchain needs Gradle 9.1+ (no wrapper is emitted).
      - name: Set up Gradle (java)
        if: matrix.backend == 'java'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'

      - name: Set up .NET (dotnet)
        if: matrix.backend == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Elixir/OTP (elixir)
        if: matrix.backend == 'elixir'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.3'
          elixir-version: '1.18.4'

      - name: Install Loom toolchain
        run: npm ci

      # Each suite hosts TWO deployables (producer salesApi + consumer
      # shipApi), each with its own database.
      - name: Create per-deployable databases
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE sales_api;" -c "CREATE DATABASE ship_api;"

      - name: Run channels redis runtime e2e (${{ matrix.backend }})
        env:
          LOOM_CHANNELS_PG_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          LOOM_CHANNELS_REDIS_URL: redis://127.0.0.1:6379
        run: npm run ${{ matrix.script }} -- --reporter=verbose

      - name: Surface failure context
        if: failure()
        run: |
          echo "## Channels redis runtime e2e failed (${{ matrix.backend }})" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'Boots the generated producer (salesApi) and consumer (shipApi) against postgres + valkey and asserts an `Order.place()` emit on salesApi publishes a CloudEvents envelope to the broadcast/ephemeral channel; shipApi'"'"'s consumer loop receives it, spawns the correlated workflow instance, and persists the Shipment in a database the producer never touches.' >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------
  # rabbitmq — queue/work, exactly-one-of-N competing consumers + DLQ
  # parking (M-T4.4 slice 3). Only postgres is a `services:` container;
  # rabbitmq is self-provisioned by the suite itself (cookie-permission
  # preseed under sandboxed docker storage drivers — see
  # channels-e2e-rabbit.test.ts), which also keeps the DLQ assertions live.
  # ---------------------------------------------------------------------
  channels-e2e-rabbit:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'run-channels'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: node
            script: test:channels-rabbit
          - backend: python
            script: test:channels-rabbit-python
          - backend: dotnet
            script: test:channels-rabbit-dotnet
          - backend: java
            script: test:channels-rabbit-java
          - backend: elixir
            script: test:channels-rabbit-elixir
    name: channels-e2e-rabbit (${{ matrix.backend }})
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up uv (python)
        if: matrix.backend == 'python'
        uses: astral-sh/setup-uv@v7

      - name: Set up JDK (java)
        if: matrix.backend == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle (java)
        if: matrix.backend == 'java'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'

      - name: Set up .NET (dotnet)
        if: matrix.backend == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Elixir/OTP (elixir)
        if: matrix.backend == 'elixir'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.3'
          elixir-version: '1.18.4'

      - name: Install Loom toolchain
        run: npm ci

      - name: Create per-deployable databases
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE sales_api;" -c "CREATE DATABASE ship_api;"

      # No LOOM_CHANNELS_AMQP_URL override: the suite self-provisions its own
      # rabbitmq:4-management-alpine sidecar (needs the cookie-preseed
      # workaround, not expressible as a plain `services:` container) and
      # tears it down in its own afterAll. Needs the docker daemon that
      # ubuntu-latest runners already ship running.
      - name: Run channels rabbitmq runtime e2e (${{ matrix.backend }})
        env:
          LOOM_CHANNELS_PG_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: npm run ${{ matrix.script }} -- --reporter=verbose

      - name: Surface failure context
        if: failure()
        run: |
          echo "## Channels rabbitmq runtime e2e failed (${{ matrix.backend }})" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'Boots the generated producer plus THREE REPLICAS of the generated consumer against postgres + rabbitmq and asserts the `queue`/`work` contract: every emit is captured in the outbox, published by the relay, and consumed by EXACTLY ONE replica of the competing-consumer fleet (no loss, no dupes); a poisoned message published straight to the channel exchange parks in the DLQ instead of being lost or wedging the queue.' >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------
  # kafka — broadcast/log, per-partition ordering-per-key + DLQ parking
  # (M-T4.4 slice 4). Same sidecar split as rabbitmq: postgres via
  # `services:`, kafka self-provisioned by the suite (multi-listener KRaft
  # single-node config — see channels-e2e-kafka.test.ts).
  # ---------------------------------------------------------------------
  channels-e2e-kafka:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'run-channels'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: node
            script: test:channels-kafka
          - backend: python
            script: test:channels-kafka-python
          - backend: dotnet
            script: test:channels-kafka-dotnet
          - backend: java
            script: test:channels-kafka-java
          - backend: elixir
            script: test:channels-kafka-elixir
    name: channels-e2e-kafka (${{ matrix.backend }})
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up uv (python)
        if: matrix.backend == 'python'
        uses: astral-sh/setup-uv@v7

      - name: Set up JDK (java)
        if: matrix.backend == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle (java)
        if: matrix.backend == 'java'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'

      - name: Set up .NET (dotnet)
        if: matrix.backend == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up Elixir/OTP (elixir)
        if: matrix.backend == 'elixir'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.3'
          elixir-version: '1.18.4'

      - name: Install Loom toolchain
        run: npm ci

      - name: Create per-deployable databases
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE sales_api;" -c "CREATE DATABASE ship_api;"

      # No LOOM_CHANNELS_KAFKA_URL override: the suite self-provisions its
      # own single-node KRaft apache/kafka sidecar and tears it down in its
      # own afterAll.
      - name: Run channels kafka runtime e2e (${{ matrix.backend }})
        env:
          LOOM_CHANNELS_PG_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: npm run ${{ matrix.script }} -- --reporter=verbose

      - name: Surface failure context
        if: failure()
        run: |
          echo "## Channels kafka runtime e2e failed (${{ matrix.backend }})" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'Boots the generated producer plus TWO REPLICAS of the generated consumer against postgres + apache/kafka (KRaft) and asserts exactly-one-of-N delivery within the consumer group, ORDERING-PER-KEY (both of an order'"'"'s events land in the same partition and are consumed by the same replica, in emit order), and DLQ parking of a poisoned record onto `<address>.dlq`.' >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------
  # auth — all three brokers wired at once, credentialed (M-T4.4 slice 5a).
  # Node only. The suite provisions redis/rabbitmq/kafka itself from the
  # GENERATED docker-compose.yml / broker-init/ artifacts (credentials,
  # RabbitMQ definitions, Kafka JAAS line aren't known until `generate
  # system` runs), so it has no override knobs and gets no broker
  # `services:` blocks — only postgres, for consistency with the other jobs.
  # ---------------------------------------------------------------------
  channels-e2e-auth:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'run-channels'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: channels-e2e-auth (node)
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Loom toolchain
        run: npm ci

      - name: Create per-deployable databases
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE sales_api;" -c "CREATE DATABASE ship_api;"

      # The suite provisions valkey/rabbitmq/kafka itself (docker run,
      # reading the generated compose file for credentials/definitions/JAAS)
      # — only postgres is handed in via override.
      - name: Run channels auth runtime e2e (node, all three brokers)
        env:
          LOOM_CHANNELS_PG_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: npm run test:channels-auth -- --reporter=verbose

      - name: Surface failure context
        if: failure()
        run: |
          echo "## Channels auth runtime e2e failed" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'Generates ONE system wiring all three brokers at once (redis broadcast/ephemeral + rabbitmq queue/work + kafka broadcast/log) and provisions each broker EXACTLY as the generated artifacts say (valkey `--requirepass`, the generated RabbitMQ `broker-init/` definitions, the generated Kafka JAAS line). Asserts POSITIVE delivery across deployables on every broker, and NEGATIVE credential-less refusal per broker (valkey NOAUTH, rabbitmq'"'"'s default `guest` account gone, kafka'"'"'s SASL-less client rejected).' >> $GITHUB_STEP_SUMMARY
