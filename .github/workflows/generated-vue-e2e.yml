name: Generated Vue e2e

# Runtime e2e for the Vue frontend: generate the Vue project, `vite build`
# it, serve the static bundle with `vite preview`, and run the SPA's own
# emitted Playwright smoke spec (every param-less page navigates + loads)
# against it.  The runtime sibling of generated-vue-build.yml — that gate
# compiles the bundle; this one proves it actually runs.  Pure client-side
# smoke (no backend), so no docker/postgres sidecar is needed.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'designs/**'
      - 'examples/vue-showcase.ddd'
      - 'vue/**'
      - 'api/**'
      - 'docker/**'
      - 'stacks/**'
      - 'test/e2e/generated-vue-e2e.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/generated-vue-e2e.yml'
  # Post-merge only.  This route-driven smoke (navigate every param-less
  # page) has caught zero regressions per-PR in practice, while the
  # per-PR generated-vue-build (vue-tsc + vite build) already covers the
  # Vue surface.  Run it on push:main as the regression net; force a
  # pre-merge run with workflow_dispatch.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vue-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pack: ['vuetify@v3', 'shadcnVue@v1']
    timeout-minutes: 20
    name: vue-showcase × ${{ matrix.pack }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Root install runs the `prepare` lifecycle (langium:generate).
      - name: Install Loom toolchain
        run: npm ci

      - name: Build toolchain
        run: npm run build

      - name: Run vue runtime e2e
        env:
          LOOM_VUE_E2E: '1'
          LOOM_VUE_E2E_PACK: ${{ matrix.pack }}
        run: npx vitest run test/e2e/generated-vue-e2e.test.ts
