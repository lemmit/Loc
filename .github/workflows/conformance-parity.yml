name: Conformance parity (per-PR)

# Per-PR tier of the cross-generator conformance harness.  Generates
# examples/showcase.ddd as a system, builds + boots ONLY the five
# backends (Hono / .NET / Phoenix / Python / Java — the SPA frontends
# are slow to build and the OpenAPI parity check doesn't need them),
# then diffs their OpenAPI specs pairwise (ops / response cardinality /
# shared field sets).
#
# Parity runs in STRICT mode: LOOM_E2E_STRICT_PARITY=1 turns each
# diff the harness reports into a hard `expect(...).toBe(...)` assertion.
# Flipped after the parity series (PRs A → C) closed the original
# showcase divergences (path namespacing, per-op + per-find routes,
# wire-shape casing); the gate now catches future generator drift on
# any of the three backends at PR time.
#
# Path-filtered to changes that can affect generated backend output so
# it doesn't run on docs-only PRs.  Branch protection (repo settings)
# decides whether this is a required check; the long build time makes
# it a reasonable non-required gate to start.

on:
  push:
    branches: [main]
    paths:
      - 'src/generator/**'
      - 'src/platform/**'
      - 'src/system/**'
      - 'src/ir/**'
      - 'examples/showcase.ddd'
      - 'docker/**'
      - 'test/e2e/e2e.test.ts'
      - 'test/_helpers/openapi-normalize.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/conformance-parity.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/generator/**'
      - 'src/platform/**'
      - 'src/system/**'
      - 'src/ir/**'
      - 'examples/showcase.ddd'
      - 'docker/**'
      - 'test/e2e/e2e.test.ts'
      - 'test/_helpers/openapi-normalize.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/conformance-parity.yml'
  workflow_dispatch:

concurrency:
  group: conformance-parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    runs-on: ubuntu-latest
    # Building five backend images (Hono npm+tsc, .NET restore+publish,
    # Phoenix mix release, Python uv, Java gradle bootJar) dominates wall
    # time — the cold Java image (gradle deps + Spring Boot) is the new
    # tail.  Generous cap; the job
    # boots the stack once and runs a single fast parity assertion.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Root install runs the `prepare` lifecycle (langium:generate)
      # which produces src/language/generated/.
      - name: Install Loom toolchain
        run: npm ci

      - name: Build toolchain
        run: npm run build

      # ubuntu-latest ships Docker + the compose plugin; no setup needed.
      - name: Run OpenAPI parity (all 5 backends)
        env:
          LOOM_E2E: '1'
          LOOM_E2E_PARITY_ONLY: '1'
          # Phoenix is back in the parity set — the vanilla showcase gaps
          # (docs/old/plans/vanilla-phoenix-gaps.md §11a–g, incl. OpenAPI-spec emission
          # and the project-wide WorkflowsController) are closed and
          # examples/showcase.ddd carries the elixir phoenixApi deployable again, so
          # parity now runs over all five backends (node/.NET/Java/Python/Phoenix).
          # Strict mode: every divergence the harness logs becomes a hard
          # `expect(...).toBe(...)` assertion (see test/e2e/e2e.test.ts).
          # Gate flipped to strict after PRs A → C closed the three
          # showcase divergences (path namespacing, per-op + per-find
          # routes, wire-shape casing).  Future generator drift on any
          # backend now fails this per-PR job.
          LOOM_E2E_STRICT_PARITY: '1'
        run: npx vitest run test/e2e/e2e.test.ts

      # On any failure above, surface the compose diagnostics the e2e test
      # writes to /tmp/loom-e2e-diagnostics.log just before its `afterAll`
      # tears the stack down.  We can't reach the compose project directly
      # from this step (outDir is gone) — the file is the bridge.
      - name: Surface compose diagnostics on failure
        if: failure()
        run: |
          if [ -f /tmp/loom-e2e-diagnostics.log ]; then
            cat /tmp/loom-e2e-diagnostics.log
          else
            echo "/tmp/loom-e2e-diagnostics.log not found — test failed before the up -d step"
          fi
