name: main-red alarm

# The missing signal. dapper sat red on 100% of main pushes and nobody
# noticed — because it was *never* green, there was no red-transition to
# alert on. This closes that gap: whenever a monitored gate concludes
# `failure` on `main`, open (or update) a single tracking issue so a broken
# gate is visible instead of silently rotting.
#
# `workflow_run` fires after the monitored workflow completes, on the default
# branch, with the repo's own token — no external secret, no Slack webhook.
# Add a workflow name below when you add a new main gate worth alarming on.

on:
  workflow_run:
    workflows:
      - "Tests + coverage"
      - "Tenancy isolation (runtime e2e)"
      - "Behavioral e2e (headless, no docker)"
      - "Behavioral e2e — .NET (ASP.NET + EF Core)"
      - "Behavioral e2e — .NET (persistence: dapper)"
      - "Behavioral e2e — Java (Spring Boot + JPA)"
      - "Behavioral e2e — Python (FastAPI)"
      - "Behavioral e2e — Elixir (plain Ecto/Phoenix)"
      - "Deploy landing page + playground to GitHub Pages"
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  alarm:
    # Only real failures on the default branch. Skip success, cancelled
    # (concurrency-superseded), and non-main runs.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const line = `- **${run.name}** failed on \`${run.head_sha.slice(0,8)}\` — [run](${run.html_url})`;

            // Dedup by the `ci-red` label (reliably indexed, unlike body text).
            const { data: open } = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'ci-red', per_page: 1,
            });
            if (open.length) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: open[0].number, body: line,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title: '🔴 main is red',
                body: `A gate failed on \`main\`. Fix or revert, then close this issue.\n\n${line}`,
                labels: ['ci-red'],
              });
            }
