name: Generated a11y (axe-core)

# accessibility.md Phase 4/5 — the axe-core tripwire over the generated
# frontends.  Generate a frontend for a design pack, build + preview it (vite
# for React/Vue/Svelte, `ng build` + a static server for Angular), then drive
# axe-core over every param-less page route and assert zero serious/critical
# WCAG 2.x A/AA violations.  The pack name selects the framework, so this one
# matrix spans all four JSX/markup frontends.  Because the output is generated,
# coverage is exhaustive across the pack matrix.
#
# axe runs REPO-side (root devDeps) against the preview URL — the generated
# project is untouched — so this never turns the per-PR build/e2e gates red.
#
# NOT per-PR (heavy: npm installs + a chromium build; and the proposal expects
# the first runs to surface violations to fix, lead pack first):
#   - nightly schedule,
#   - on-demand via the `a11y` label on a PR,
#   - manual dispatch.

on:
  schedule:
    - cron: '0 5 * * *'      # 05:00 UTC nightly
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe:
    # Schedule / manual always; on a PR only when the `a11y` label is set.
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'a11y'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The pack name selects the framework (packFormatForBuiltin): the React
        # packs scan showcase.ddd; the Vue/Svelte/Angular packs scan the shared
        # scaffold system.  All four JSX/markup frontends are covered.
        pack:
          - 'mantine@v9'        # react
          - 'shadcn@v4'         # react
          - 'mui@v7'            # react
          - 'chakra@v3'         # react
          - 'vuetify@v3'        # vue
          - 'shadcnVue@v1'      # vue
          - 'shadcnSvelte@v1'   # svelte
          - 'flowbite@v1'       # svelte
          - 'angularMaterial@v1' # angular
          - 'primeng@v1'        # angular
          - 'spartanNg@v1'      # angular
          - 'feliz'             # feliz (F#/Fable) — dotnet fable → vite build
    timeout-minutes: 25
    name: axe × ${{ matrix.pack }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Feliz alone needs the .NET SDK — `dotnet fable` compiles its F# to JS
      # before vite bundles it (mirrors generated-feliz-build.yml).  The other
      # (JSX/markup) frameworks build with vite/ng only, so skip the install.
      - uses: actions/setup-dotnet@v4
        if: matrix.pack == 'feliz'
        with:
          dotnet-version: '8.0'

      # Root install runs the `prepare` lifecycle (langium:generate) and pulls
      # the repo-side axe/playwright devDeps.
      - name: Install Loom toolchain
        run: npm ci

      - name: Build toolchain
        run: npm run build

      - name: Install the axe chromium browser
        run: npx playwright install --with-deps chromium

      - name: Run generated-frontend axe scan
        env:
          LOOM_A11Y_E2E: '1'
          LOOM_A11Y_PACK: ${{ matrix.pack }}
        run: npx vitest run test/e2e/generated-a11y-e2e.test.ts
