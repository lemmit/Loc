name: .NET OIDC auth (runtime e2e)

# Runtime-verifies the OIDC turnkey-auth chain (D-AUTH-OIDC) on the .NET
# backend, end-to-end: boots a REAL Keycloak (the bundled dev realm import)
# + postgres in docker, runs the generated .NET backend natively
# (`dotnet run`), gets a real token for the seeded `demo` user via the
# password grant, and asserts the generated OidcUserVerifier validates it
# against Keycloak's live JWKS and maps the configured claims (incl. the
# dotted realm_access.roles path) onto User.
#
# The .NET sibling of hono-oidc-e2e.yml — the runtime check the compile-only
# `dotnet build /warnaserror` gate can't give (it caught the http-issuer
# HttpDocumentRetriever.RequireHttps default that rejected every request).
# ubuntu-latest ships docker; the backend runs natively, Keycloak + postgres
# are pulled images (no build).
#
# Triggers `push: main` + manual dispatch only — NOT per-PR (sibling to the
# *-obs-e2e jobs; same rationale: regression net, not a PR gate, and the
# .NET restore + Keycloak boot are heavier than a unit suite).
on:
  push:
    branches: [main]
    paths:
      - 'src/generator/dotnet/**'
      - 'src/system/index.ts'
      - 'test/e2e/auth-oidc-dotnet-e2e.test.ts'
      - 'test/e2e/fixtures/auth-oidc-e2e-dotnet.ddd'
      - 'package.json'
      - '.github/workflows/dotnet-oidc-e2e.yml'
  workflow_dispatch:
  merge_group:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dotnet-oidc-e2e:
    runs-on: ubuntu-latest
    # Keycloak boot (~25s) + the generated project's `dotnet restore` (cold
    # ~2-3min) dominate.  15min cap.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Loom toolchain
        run: npm ci

      - name: Run .NET OIDC runtime e2e
        env:
          LOOM_AUTH_E2E_DOTNET: '1'
        run: npm run test:auth-e2e-dotnet -- --reporter=verbose

      - name: Surface failure context
        if: failure()
        run: |
          echo '## .NET OIDC runtime e2e failed' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the "Run .NET OIDC runtime e2e" step above for the captured backend stdout.' >> $GITHUB_STEP_SUMMARY
          echo 'The test boots a real Keycloak + postgres, gets a token for the seeded `demo` user, and asserts the generated .NET OIDC verifier validates it (JWKS) and maps the claims onto User.' >> $GITHUB_STEP_SUMMARY
