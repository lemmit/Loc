name: Playground e2e

# Runs the Playwright specs against the production-built playground.
# Each spec drives a real Chromium instance through the
# editor → generate → bundle → boot → preview pipeline; together
# they cover everything that's hard to assert at the unit-test level
# (worker IO, service-worker handoff, iframe synthesis, IDB
# persistence, custom-pack ingestion).
#
# The specs hit `esm.sh` and `jsdelivr` for the bundle/boot steps —
# CI runners have internet access so the network-gated steps don't
# self-skip the way they do in local sandboxes.
#
# Triggers: every PR to main + every direct push to main.  Branch-
# protection (configured separately in repo settings) decides whether
# this is a required check.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/**'
      - 'designs/**'
      - 'vite/**'
      - 'api/**'
      - 'docker/**'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/playground-e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/**'
      - 'designs/**'
      - 'vite/**'
      - 'api/**'
      - 'docker/**'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/playground-e2e.yml'
  workflow_dispatch:

# Cancel in-flight runs of the same branch when a new commit lands.
# Saves CI minutes on rebases and force-pushes; the latest commit is
# what ultimately gets gated.
concurrency:
  group: playground-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Job cap.  Playwright per-test timeout is 4min × ~11 tests; a
    # stuck pipeline could otherwise burn well past this.  Bumped
    # from 10 → 30 once stack v3 (React 19) + Tailwind 4 + the new
    # pack majors landed: the playground preview's cold esm.sh
    # fetches got heavier and the 10-minute cap began swallowing
    # otherwise-healthy runs (two consecutive `cancelled` verdicts
    # at the exact 10-min mark on the post-backend-packages CI),
    # giving us no signal.  30 leaves ample headroom for cold
    # cache + a deliberate safety margin without making a genuinely
    # stuck pipeline expensive.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      # Root install runs the `prepare` lifecycle (langium:generate)
      # which produces src/language/generated/ — the playground build
      # imports that path via toolchain re-exports.
      - name: Install Loom toolchain (root)
        run: npm ci

      - name: Install playground deps
        working-directory: web
        run: npm ci

      # Cache the Playwright browser binaries (~100MB) keyed off the
      # @playwright/test version; re-installs only when Playwright
      # itself bumps.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npx playwright install --with-deps chromium

      # `--with-deps` only installs OS deps when binaries are
      # downloaded; on a cache hit we still need them.  This step is
      # cheap (~5s) when the deps are already present.
      - name: Install Chromium OS deps (cache-hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: web
        run: npx playwright install-deps chromium

      # Build the same-origin npm mirror + design-pack vendor into
      # web/public/ (the exact artifacts pages.yml ships to production).
      # `vite build` — run by the Playwright webServer — copies public/
      # into dist/, so `vite preview` serves them same-origin.  The
      # in-browser bundler auto-prefers these when present
      # (vfs-bundler.worker.ts: deployBase/npm-mirror + vendor importmap),
      # so the preview specs resolve their ~hundreds of dependency
      # tarballs locally instead of hammering the public registry.
      # Without this the six `*-preview` specs each pull the full tree
      # over the network concurrently and time out at the 180s bundle
      # gate — the long-standing red on this job.
      - name: Build npm mirror
        working-directory: web
        run: npm run build:npm-mirror

      - name: Build design-pack vendor
        working-directory: web
        run: npm run build:vendor

      - name: Run Playwright specs
        working-directory: web
        run: npm run e2e

      # Upload the Playwright HTML report (with embedded trace) on
      # failure so we can inspect what the browser saw without
      # re-running locally.  Only the report dir is shipped — the raw
      # test-results/ tree is redundant with it and would double the
      # artifact size.  Short retention + max compression keep this
      # well under the 500MB Actions storage quota.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 2
          compression-level: 9
