name: Playground e2e

# Runs the Playwright specs against the production-built playground.
# Each spec drives a real Chromium instance through the
# editor → generate → bundle → boot → preview pipeline; together
# they cover everything that's hard to assert at the unit-test level
# (worker IO, service-worker handoff, iframe synthesis, IDB
# persistence, custom-pack ingestion).
#
# The specs hit `esm.sh` and `jsdelivr` for the bundle/boot steps —
# CI runners have internet access so the network-gated steps don't
# self-skip the way they do in local sandboxes.
#
# Triggers: every direct push to main (i.e. after merge) + a daily
# scheduled run + manual dispatch.  The per-PR trigger was removed
# because these specs are network-gated (esm.sh / jsdelivr / npm) and
# flaky enough that gating every PR on them cost more than it caught.
# Branch-protection (configured separately in repo settings) decides
# whether the post-merge run is a required check.
#
# To re-enable per-PR gating, add back a `pull_request:` block with the
# same `paths:` filter as `push:` below.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/**'
      - 'designs/**'
      - 'vite/**'
      - 'api/**'
      - 'docker/**'
      - 'package.json'
      - 'package-lock.json'
      - 'langium-config.json'
      - '.github/workflows/playground-e2e.yml'
  # Daily run at 06:00 UTC so the network-gated suite still gets
  # exercised against main even on days with no merges.
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# Cancel in-flight runs of the same branch when a new commit lands.
# Saves CI minutes on rebases and force-pushes; the latest commit is
# what ultimately gets gated.
concurrency:
  group: playground-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Job cap.  History:
    #   10 → 30 (stack v3, Tailwind 4, cold esm.sh fetches got heavier)
    #   30 → 45 (preview-runtime started reliably hitting 3min × retries)
    #   45 → 75 (diagnostic round: bumped per-test cap to 12min so we can
    #            tell whether the bundle is just slow vs genuinely stuck.
    #            5 preview-runtime/runtime specs × up-to-12min × 2 retries
    #            / 2 workers ≈ 60min worst case — 75 leaves a margin)
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      # Root install runs the `prepare` lifecycle (langium:generate)
      # which produces src/language/generated/ — the playground build
      # imports that path via toolchain re-exports.
      - name: Install Loom toolchain (root)
        run: npm ci

      - name: Install playground deps
        working-directory: web
        run: npm ci

      # Pre-build the local npm-tarball mirror. Without it, the in-browser
      # Bundle step in every `*-preview-runtime` spec (chakra-v3, mantine-v9,
      # mui-v7, shadcn-v4, preview-shadcn) and runtime.spec.ts has to cold-
      # fetch ~150 tarballs from registry.npmjs.org / esm.sh PER SPEC, which
      # routinely takes 3-5 minutes apiece on CI's network. The mirror walks
      # every shipped example, resolves their transitive deps, downloads each
      # tarball to web/public/npm-mirror/, and writes a manifest the vfs-
      # bundler worker prefers over the registry. Result: Bundle drops from
      # minutes to seconds and the bundle/boot timeouts stop bleeding into
      # the job cap.
      - name: Pre-build npm-tarball mirror
        working-directory: web
        run: |
          npm run build:npm-mirror
          echo "::group::npm mirror summary"
          echo "manifest entries: $(jq 'length' public/npm-mirror/manifest.json)"
          echo "tarball count:    $(ls public/npm-mirror/*.tgz 2>/dev/null | wc -l)"
          echo "total size:       $(du -sh public/npm-mirror/ | cut -f1)"
          echo "first 5 frontend packages (jq):"
          jq -r 'to_entries[] | select(.key | test("react|mantine|chakra|mui|emotion")) | .key' public/npm-mirror/manifest.json | head -5 || echo "  (none — mirror is backend-only, bug!)"
          echo "::endgroup::"

      # Cache the Playwright browser binaries (~100MB) keyed off the
      # @playwright/test version; re-installs only when Playwright
      # itself bumps.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npx playwright install --with-deps chromium

      # `--with-deps` only installs OS deps when binaries are
      # downloaded; on a cache hit we still need them.  This step is
      # cheap (~5s) when the deps are already present.
      - name: Install Chromium OS deps (cache-hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: web
        run: npx playwright install-deps chromium

      - name: Run Playwright specs
        working-directory: web
        run: npm run e2e

      # Upload the Playwright HTML report (with embedded trace) on
      # failure *or cancellation* so we can inspect what the browser saw
      # without re-running locally.  Cancellation matters here: when the
      # suite hits the 75-min job cap it ends as `cancelled`, not
      # `failure()`, so a plain `failure()` guard shipped zero
      # diagnostics on exactly the runs we most need to triage (a capped
      # run can't tell us which spec was slow vs genuinely stuck).  Only
      # the report dir is shipped — the raw test-results/ tree is
      # redundant with it and would double the artifact size.  Short
      # retention + max compression keep this well under the 500MB
      # Actions storage quota.
      - name: Upload Playwright report on failure or timeout
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 2
          compression-level: 9
