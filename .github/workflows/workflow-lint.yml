name: Lint GitHub Actions workflows

# Guards against the failure mode where a malformed workflow file merges to
# main and then reports a permanent `startup_failure` on every push — a red
# check nobody gates on, because the fast `tests-passed` rollup is the only
# required check.  A single unquoted colon in a `name:` (e.g.
# `name: … (persistence: dapper)`) makes the whole file unparseable and the
# gate silently never runs.  This job runs on the PR, so that class is caught
# before it ever reaches main.
#
# Two layers:
#   1. Every `.github/workflows/*.yml` must be valid YAML (catches the
#      startup_failure class directly — the workflow that regressed here).
#   2. actionlint over the whole directory (expression syntax, shellcheck on
#      run: steps, deprecated-runner hints, etc.).

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Every workflow file is valid YAML
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          bad = []
          for f in sorted(glob.glob(".github/workflows/*.yml") + glob.glob(".github/workflows/*.yaml")):
              try:
                  yaml.safe_load(open(f))
              except yaml.YAMLError as e:
                  bad.append((f, e))
          for f, e in bad:
              print(f"::error file={f}::invalid workflow YAML — {e}")
          if bad:
              sys.exit(1)
          print("all workflow files parse")
          PY

      # actionlint over the whole workflows dir (expression syntax, shellcheck
      # on run: steps, deprecated-runner hints). Official image — no
      # third-party action version to rot. Best-effort layer; the YAML-parse
      # step above is the hard guard for the startup_failure class.
      - name: actionlint
        uses: docker://rhysd/actionlint:latest
