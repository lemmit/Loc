name: Corpus compile gate (Elixir / Ash)

# The Phoenix/Ash sibling of corpus-build.yml — compiles EVERY corpus
# feature (test/fixtures/corpus/*.ddd) under `mix compile --warnings-as-error`
# against real Ash 3.x in the hexpm/elixir Docker image.  Split into its own
# workflow because Elixir needs Docker + sharded per-feature dep caching (a
# full sequential corpus run can't finish in one job's timeout — the same
# reason elixir-ash-build.yml is sharded).
#
# A `configure` job enumerates the elixir corpus features via `vitest list`
# (which reads the test's OWN it.each list — the shared manifest minus
# ELIXIR_COMPILE_SKIP — so there's one source of truth and adding a feature
# auto-extends the matrix).  The matrix then runs ONE feature per cell via
# LOOM_CORPUS_ELIXIR_CASE: each cell pre-generates to a stable path to compute
# its own deps-cache signature, restores its per-feature cache, then hands off
# to the test (which honours LOOM_PHOENIX_OUT_DIR and skips regeneration when
# the project is already on disk, so restored deps survive).  Mirrors
# elixir-ash-build.yml exactly.
#
# Hex access: CI runners reach hex.pm directly, so LOOM_HEX_MIRROR is NOT set
# (the loopback TLS mirror is only for the fingerprint-filtering sandbox proxy
# — see CLAUDE.md §14).
#
# Triggers: changes to the Elixir generator / HEEx packs / corpus
# fixtures / the corpus test, plus push:main and manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - 'src/generator/elixir/**'
      - 'src/platform/elixir.ts'
      - 'src/ir/**'
      - 'src/system/**'
      - 'designs/coreComponents/**'
      - 'designs/daisyui/**'
      - 'test/fixtures/corpus/**'
      - 'test/e2e/corpus-elixir-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/corpus-elixir-build.yml'
  pull_request:
    paths:
      - 'src/generator/elixir/**'
      - 'src/platform/elixir.ts'
      - 'src/ir/**'
      - 'src/system/**'
      - 'designs/coreComponents/**'
      - 'designs/daisyui/**'
      - 'test/fixtures/corpus/**'
      - 'test/e2e/corpus-elixir-build.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/corpus-elixir-build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Enumerate the elixir corpus features from the test's own it.each list
  # (`vitest list` honours describe.skipIf, so LOOM_PHOENIX_BUILD=1 is set to
  # un-skip the describe).  Single source of truth — the manifest minus
  # ELIXIR_COMPILE_SKIP — no feature list duplicated in YAML.
  configure:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Loom toolchain
        run: npm ci
      - id: set
        env:
          LOOM_PHOENIX_BUILD: '1'
        run: |
          cases=$(npx vitest list test/e2e/corpus-elixir-build.test.ts 2>/dev/null \
            | sed -nE 's/.* > ([a-z0-9-]+) — generated Phoenix project compiles$/\1/p' \
            | jq -R . | jq -cs .)
          echo "features: $cases"
          echo "matrix={\"feature\":$cases}" >> "$GITHUB_OUTPUT"

  # One job PER feature — mirrors elixir-ash-build.yml.  Each cell's cold path
  # is ONE feature (~5-7min: deps.get + mix compile in Docker), well under the
  # timeout, and reseeds its own per-feature deps cache so a cold cache
  # self-heals.
  corpus-elixir:
    needs: configure
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.configure.outputs.matrix) }}
    timeout-minutes: 20
    name: ${{ matrix.feature }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Loom toolchain
        run: npm ci

      # Pre-generate THIS feature's Phoenix project to a stable path so we can
      # hash the emitted mix.exs for the cache key (cheap — no docker, no hex).
      # The token-swap mirrors materializeCorpusFixture(featureId,"phoenix"):
      # phoenix → `elixir { foundation: ash }`.  The test step (with
      # LOOM_PHOENIX_OUT_DIR set) reuses this tree and skips its own
      # regeneration when mix.exs already exists, so the docker `mix compile`
      # runs against THIS source with deps restored from the cache.
      - name: Pre-generate feature (for cache key)
        run: |
          mkdir -p "/tmp/ci/phoenix-corpus/${{ matrix.feature }}/out"
          sed 's/__PLATFORM__/elixir { foundation: ash }/' \
            "test/fixtures/corpus/${{ matrix.feature }}.ddd" > "/tmp/${{ matrix.feature }}.ddd"
          node bin/cli.js generate system "/tmp/${{ matrix.feature }}.ddd" \
            -o "/tmp/ci/phoenix-corpus/${{ matrix.feature }}/out"

      # The dep set only changes when the emitted mix.exs changes, so sign the
      # per-feature cache key on that mix.exs hash.  The deployable is `d`.
      - name: Compute Phoenix dep signature
        id: depsig
        run: |
          hash=$(sha256sum "/tmp/ci/phoenix-corpus/${{ matrix.feature }}/out/d/mix.exs" | cut -d' ' -f1)
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Cache Phoenix deps + _build
        uses: actions/cache@v5
        with:
          path: |
            /tmp/ci/phoenix-corpus/${{ matrix.feature }}/out/d/deps
            /tmp/ci/phoenix-corpus/${{ matrix.feature }}/out/d/_build
          key: phoenix-corpus-${{ matrix.feature }}-${{ steps.depsig.outputs.hash }}
          restore-keys: |
            phoenix-corpus-${{ matrix.feature }}-

      # Hand off to the test — LOOM_CORPUS_ELIXIR_CASE selects this one
      # feature's it.each iteration, which spawns `docker run mix compile
      # --warnings-as-errors`.  LOOM_HEX_MIRROR intentionally unset (CI has
      # direct hex.pm access).
      - name: Run corpus elixir build (this feature)
        env:
          LOOM_PHOENIX_BUILD: '1'
          LOOM_PHOENIX_OUT_DIR: /tmp/ci/phoenix-corpus
          LOOM_CORPUS_ELIXIR_CASE: ${{ matrix.feature }}
        run: npx vitest run test/e2e/corpus-elixir-build.test.ts

      - name: Surface failure context
        if: failure()
        run: |
          echo "## Phoenix corpus mix compile failed: ${{ matrix.feature }}" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the "Run corpus elixir build" step above for the captured `mix deps.get` + `mix compile --warnings-as-errors` diagnostics.' >> $GITHUB_STEP_SUMMARY
          echo 'This cell builds `test/fixtures/corpus/${{ matrix.feature }}.ddd` on `elixir { foundation: ash }` via its `it.each` iteration in `test/e2e/corpus-elixir-build.test.ts`.' >> $GITHUB_STEP_SUMMARY
