name: Elixir / Vanilla runtime e2e (observability)

# Boots the generated vanilla Phoenix backend against a real postgres
# sidecar, hits /health, then asserts the JSON-per-line stdout from the
# rendered <App>.LogFormatter carries the catalog envelope:
#   server_starting → server_listening → request_start → request_end →
#   server_shutdown → server_drained
#
# Vanilla mirror of `elixir-ash-obs-e2e.yml`.  Catches drift the unit
# tests miss — e.g. the shared `renderApplication` / `renderTelemetry` /
# `renderLogFormatter` not playing nice with the vanilla shell wiring
# (Repo, PubSub, RequestContext Plug, :logger formatter config).
#
# Triggers `push: main` + manual dispatch only — NOT per-PR.  Cold path
# (~3-5min) is lighter than the Ash mirror (no AshPostgres / no
# ResourceGenerator) so a 10min cap is comfortable.
on:
  push:
    branches: [main]
    paths:
      - 'src/generator/elixir/vanilla/**'
      - 'src/generator/elixir/shell/**'
      - 'src/generator/elixir/telemetry-emit.ts'
      - 'src/generator/_obs/**'
      - 'src/platform/elixir.ts'
      - 'test/e2e/observability-events-elixir-vanilla.test.ts'
      - 'package.json'
      - '.github/workflows/elixir-vanilla-obs-e2e.yml'
  workflow_dispatch:
  # On-demand per-PR run: apply the `run-e2e` label to a PR to run this
  # otherwise push:main-only suite against that branch before merge.  The
  # job-level `if` below restricts the labeled trigger to that one label
  # so unrelated labels don't kick off the boot.
  pull_request:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  vanilla-obs-e2e:
    runs-on: ubuntu-latest
    # Skip the labeled trigger unless it's specifically `run-e2e`; push
    # and manual (`workflow_dispatch`) runs always proceed.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'run-e2e'
    # Cold path: hex deps + plain Phoenix compile + postgres pull is
    # ~3-5min (no AshPostgres in the dep set).  10min is comfortable.
    timeout-minutes: 10
    # Service container — pre-starts postgres on the host network with a
    # built-in healthcheck before any step runs.  Same approach as the
    # Ash sibling workflow.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: api
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # erlef/setup-beam — same version pins as the Ash mirror so the
      # dep set resolves identically.
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27.3'
          elixir-version: '1.18.4'

      - name: Install Loom toolchain
        run: npm ci

      # Cache the hex dep tree + _build outputs across runs.  The key
      # tracks the vanilla shell-emit module that emits mix.exs so a dep
      # change mints a fresh entry, but unrelated emitter tweaks reuse
      # the warm cache.
      - name: Cache hex deps + _build
        uses: actions/cache@v5
        with:
          path: |
            ~/.hex
            ~/.mix
          key: hex-mix-vanilla-${{ hashFiles('src/generator/elixir/vanilla/shell-emit.ts') }}
          restore-keys: |
            hex-mix-vanilla-

      - name: Run vanilla observability runtime e2e
        env:
          LOOM_OBS_E2E_PHOENIX_VANILLA: '1'
          # The test reads LOOM_OBS_PG_URL and skips its in-test
          # `docker run postgres` step when the URL is supplied.
          LOOM_OBS_PG_URL: 'postgres://postgres:postgres@127.0.0.1:5432'
          LOOM_OBS_PG_DB: 'api'
        run: npx vitest run test/e2e/observability-events-elixir-vanilla.test.ts --reporter=verbose

      - name: Surface failure context
        if: failure()
        run: |
          echo '## Vanilla Phoenix runtime e2e failed' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the runtime-e2e step above for the captured server stdout.' >> $GITHUB_STEP_SUMMARY
          echo 'Asserts the <App>.LogFormatter stream carries the catalog envelope (server_starting → server_listening → request_start → request_end → server_shutdown → server_drained).' >> $GITHUB_STEP_SUMMARY
