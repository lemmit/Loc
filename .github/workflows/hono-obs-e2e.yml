name: Hono observability events (runtime e2e)

# Boots the generated Hono backend, hits /health, then asserts the
# pino JSON-per-line stdout carries the catalog envelope:
#   server_starting → server_listening → request_start → request_end →
#   server_shutdown
#
# Lighter than the .NET / Phoenix sibling jobs — Hono runs in pure Node
# and the pg pool is lazy, so the suite needs no docker / no postgres
# sidecar.  Cost is dominated by the `npm install` of the generated
# project's deps (~60-90s with cache, ~3-4min cold).
#
# Triggers `push: main` + manual dispatch only — NOT per-PR.  Sibling
# to dotnet-obs-e2e / elixir-vanilla-obs-e2e; same rationale (regression net,
# not a PR gate).  Three concurrent obs-e2e runs on every Hono / .NET /
# Phoenix-touching PR added up to a docker / runner burst exactly of
# the shape anti-abuse heuristics watch for on public repos.  Catching
# runtime regressions one merge later is acceptable.
on:
  push:
    branches: [main]
    paths:
      - 'src/generator/typescript/**'
      - 'src/platform/hono/**'
      - 'src/generator/_obs/**'
      - 'test/e2e/observability-events.test.ts'
      - 'package.json'
      - '.github/workflows/hono-obs-e2e.yml'
  workflow_dispatch:
  merge_group:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hono-obs-e2e:
    runs-on: ubuntu-latest
    # Cold path: ~3-4min (npm install of the generated project).
    # Warm path: ~60-90s.  8min cap.
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Loom toolchain
        run: npm ci

      - name: Run Hono observability runtime e2e
        env:
          LOOM_OBS_E2E: '1'
        run: npx vitest run test/e2e/observability-events.test.ts --reporter=verbose

      - name: Surface failure context
        if: failure()
        run: |
          echo '## Hono runtime e2e failed' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the "Run Hono observability runtime e2e" step above for the captured server stdout.' >> $GITHUB_STEP_SUMMARY
          echo 'The test asserts the pino stream carries the catalog envelope (server_starting → server_listening → request_start → request_end → server_shutdown) with correlated request_id.' >> $GITHUB_STEP_SUMMARY
