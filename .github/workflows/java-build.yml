name: Java build verification

# Compiles a Java project generated from each test-fixture .ddd by
# `ddd generate system`, then runs `gradle testClasses bootJar`
# (compiles main + the emitted JUnit test sources, packages the jar).  Catches emission bugs
# in the Java generator that the string-match unit tests cannot see
# (missing imports, JPA mapping shapes Hibernate rejects, Spring Data
# signature drift, record/embeddable mismatches).
#
# Mirrors `dotnet-build.yml` (.NET → dotnet build /warnaserror) and
# `elixir-vanilla-build.yml` (Phoenix → mix compile --warnings-as-errors).
#
# Triggers:
#   - PRs that touch the Java generator, the java platform module, or
#     the java build fixtures.
#   - Pushes to main (full regression check).
#   - Manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - 'src/generator/java/**'
      - 'src/generator/_expr/**'
      - 'src/ir/**'
      - 'src/platform/java.ts'
      - 'examples/**'
      - 'package.json'
      - '.github/workflows/java-build.yml'
      - 'test/e2e/generated-java-build.test.ts'
      - 'test/e2e/fixtures/java-build/**'
  pull_request:
    paths:
      - 'src/generator/java/**'
      - 'src/generator/_expr/**'
      - 'src/ir/**'
      - 'src/platform/java.ts'
      - 'examples/**'
      - 'package.json'
      - '.github/workflows/java-build.yml'
      - 'test/e2e/generated-java-build.test.ts'
      - 'test/e2e/fixtures/java-build/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-generated-java:
    runs-on: ubuntu-latest
    # Cold Gradle runs download the Spring Boot dependency tree (~2min);
    # warm runs with the ~/.gradle cache below are ~30s per fixture.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      # Pin Gradle explicitly — the generated projects target a Java 25
      # toolchain, which requires Gradle 9.1+, newer than the runner's
      # pre-installed Gradle.  No wrapper is emitted, so this is what puts
      # a compatible `gradle` on PATH for `test:java`.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'

      # Cache the Gradle caches across runs.  Keyed on the build
      # template (the generated dependency set only moves when the
      # pinned versions in emit/program.ts move).
      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('src/generator/java/emit/program.ts') }}
          restore-keys: |
            gradle-

      # Build the Loom toolchain.  `prepare` lifecycle runs
      # `langium:generate` which populates src/language/generated/.
      - name: Install Loom toolchain
        run: npm ci

      - name: Type-check
        run: npm run build

      - name: gradle testClasses bootJar against each fixture
        run: npm run test:java

      - name: Surface gradle output on failure
        if: failure()
        run: |
          echo '## Tail of test:java output' >> $GITHUB_STEP_SUMMARY
          echo 'See the previous step log for full `gradle` diagnostics — the test inherits stdio so per-file errors appear there as `[ERROR]` lines.' >> $GITHUB_STEP_SUMMARY
