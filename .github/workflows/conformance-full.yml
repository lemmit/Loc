name: Conformance full (nightly)

# Full tier of the cross-generator conformance harness.  Generates
# examples/showcase.ddd, builds + boots the WHOLE stack (three
# backends + three React frontends + postgres), and runs:
#   - /health on every deployable,
#   - the generated DSL-level e2e suite (vitest + fetch),
#   - the generated Playwright UI suite,
#   - the 3-way OpenAPI parity diff.
#
# This is the behavioral + UI half of the L-matrix backend strip.  It
# is heavy (full image builds + browser install), so it runs nightly
# and on demand rather than per-PR.  The per-PR `conformance-parity`
# workflow covers the cheap spec-diff on every relevant change.

on:
  schedule:
    # 03:42 UTC nightly — off-peak, after most merges have landed.
    - cron: '42 3 * * *'
  workflow_dispatch:
  # On-demand per-PR run: apply the `run-conformance` label to a PR to boot
  # the full stack and run the behavioral + UI + parity suite against that
  # branch — the same job the nightly runs, but opt-in.  This is how the
  # behavioral negative-path conformance blocks (the cross-backend
  # `expect(<call>).toThrow(N)` replays in examples/showcase.ddd) get
  # exercised before merge instead of waiting for the next nightly.  The
  # job-level `if` below restricts the labeled trigger to that one label so
  # other labels don't kick off an hour-long build.
  pull_request:
    types: [labeled]

concurrency:
  # Per-PR runs key off the PR ref; scheduled/dispatch runs off the branch
  # ref.  Either way a newer trigger cancels the older in-flight run.
  group: conformance-full-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  full:
    runs-on: ubuntu-latest
    # Skip the labeled trigger unless it's specifically `run-conformance`;
    # scheduled and manual (`workflow_dispatch`) runs always proceed.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'run-conformance'
    timeout-minutes: 60
    env:
      # Keep Playwright's browser download in a cacheable location; the
      # generated frontends' e2e/ dirs install + run Playwright against
      # this path (the e2e test forwards PLAYWRIGHT_BROWSERS_PATH).
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Loom toolchain
        run: npm ci

      - name: Build toolchain
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.pw-browsers
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run full conformance e2e (build + boot + behavioral + UI + parity)
        env:
          LOOM_E2E: '1'
        run: npx vitest run test/e2e/e2e.test.ts

      - name: Surface compose diagnostics on failure
        if: failure()
        run: |
          if [ -f /tmp/loom-e2e-diagnostics.log ]; then
            cat /tmp/loom-e2e-diagnostics.log
          else
            echo "/tmp/loom-e2e-diagnostics.log not found — test failed before the up -d step"
          fi
