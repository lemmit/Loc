name: Elixir / Ash runtime e2e (observability + embeds-react)

# Boots the generated Phoenix backend against a real postgres sidecar,
# hits /health, then asserts the JSON-per-line stdout from the custom
# <App>.LogFormatter carries the catalog envelope:
#   server_starting → server_listening → request_start → request_end →
#   server_shutdown → server_drained
#
# Catches drift the unit tests miss — e.g. the JSON formatter dropping
# a metadata key, Application.stop/1 not firing on SIGTERM, the
# :telemetry handler from Bite 1 not bridging endpoint events to the
# catalog identity.
#
# Triggers `push: main` + manual dispatch only — NOT per-PR.  Sibling
# to dotnet-obs-e2e / hono-obs-e2e; same rationale (regression net,
# not a PR gate).  Phoenix specifically was the heaviest of the three:
# hex deps + Ash 3.x compile + postgres pull at 5-8min cold.  Catching
# runtime regressions one merge later is acceptable.
on:
  push:
    branches: [main]
    paths:
      - 'src/generator/elixir/**'
      - 'src/generator/_obs/**'
      - 'src/generator/react/**'
      - 'src/platform/elixir.ts'
      - 'designs/ashPhoenix/**'
      - 'test/e2e/observability-events-phoenix.test.ts'
      - 'test/e2e/embed-react-phoenix.test.ts'
      - 'test/e2e/fixtures/phoenix-build/phoenix-embed-react.ddd'
      - 'package.json'
      - '.github/workflows/elixir-ash-obs-e2e.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phoenix-obs-e2e:
    runs-on: ubuntu-latest
    # Cold path: hex deps + Ash compile + postgres pull is ~5-8min.
    # Warm path (with the deps cache below): ~90s.  15min is a tight
    # cap that protects CI minutes while leaving headroom for a slow
    # hex.pm fetch.
    timeout-minutes: 15
    # Service container — pre-starts postgres on the host network with a
    # built-in healthcheck before any step runs.  Replaces the in-test
    # `docker run` approach which surfaced an OOM-under-load failure
    # mode on the runner: mix's parallel compile + AshPostgres'
    # ResourceGenerator + the docker-published postgres process pushed
    # past the runner's memory ceiling and got the CREATE DATABASE
    # connection killed mid-transaction.  Host-network service avoids
    # the indirection and the duplicate process overhead.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: phoenix_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # erlef/setup-beam is the canonical action for Elixir/OTP on CI —
      # version pinning here matches the hexpm/elixir docker tag used
      # by phoenix-build.yml so the dep set resolves identically.
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          elixir-version: '1.17.2'

      - name: Install Loom toolchain
        run: npm ci

      # Cache the hex dep tree + _build outputs across runs.  The key
      # tracks the generator file that emits mix.exs so a dep change
      # mints a fresh entry, but unrelated emitter tweaks reuse the
      # warm cache (~5min → ~30s on the heavy steps).
      - name: Cache hex deps + _build
        uses: actions/cache@v5
        with:
          path: |
            ~/.hex
            ~/.mix
          # The fixture project is generated into a tmpdir per test
          # run, so we can't cache deps/ + _build/ at a stable path;
          # caching the global hex + mix dirs is the next best thing
          # and still saves the http fetch.
          key: hex-mix-${{ hashFiles('src/generator/elixir/index.ts') }}
          restore-keys: |
            hex-mix-

      - name: Run Phoenix observability runtime e2e
        env:
          LOOM_OBS_E2E_PHOENIX: '1'
          # The test reads LOOM_OBS_PG_URL and skips its in-test
          # `docker run postgres` step when the URL is supplied.
          LOOM_OBS_PG_URL: 'postgres://postgres:postgres@127.0.0.1:5432'
          # Distinct database per step — both generated apps are named
          # `phoenix_app` and their initial migrations share one version
          # (BASE_TIMESTAMP), so a shared database lets the first step's
          # `schema_migrations` shadow the second's migration (it gets
          # skipped, leaving its tables uncreated).  Isolate them.  The
          # generated dev.exs honors DATABASE_URL, so each app targets its
          # own database.
          LOOM_OBS_PG_DB: 'phoenix_app_obs'
        run: npx vitest run test/e2e/observability-events-phoenix.test.ts --reporter=verbose

      # D-PHOENIX-SURFACE: same postgres service + BEAM setup, second
      # runtime guard — boots a phoenix-embeds-react deployable, builds the
      # SPA into priv/static/app, and asserts GET /app serves the SPA
      # index.html while GET /api/products serves the Ash JSON API from one
      # origin.  Shares this workflow rather than minting a new one (the
      # heavy provisioning — postgres + hex deps + Ash compile — is
      # identical).
      - name: Run Phoenix embeds-React runtime e2e
        env:
          LOOM_EMBED_E2E_PHOENIX: '1'
          LOOM_OBS_PG_URL: 'postgres://postgres:postgres@127.0.0.1:5432'
          # Distinct from the observability step's database (see note above)
          # so the shared migration version doesn't shadow this migration.
          LOOM_OBS_PG_DB: 'phoenix_app_embed'
        run: npx vitest run test/e2e/embed-react-phoenix.test.ts --reporter=verbose

      - name: Surface failure context
        if: failure()
        run: |
          echo '## Phoenix runtime e2e failed' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'See the runtime-e2e steps above for the captured server stdout.' >> $GITHUB_STEP_SUMMARY
          echo '- Observability: asserts the <App>.LogFormatter stream carries the catalog envelope (server_starting → server_listening → request_start → request_end → server_shutdown → server_drained).' >> $GITHUB_STEP_SUMMARY
          echo '- Embeds-React: asserts GET /app serves the SPA index.html and GET /api/products serves the Ash JSON API from one origin.' >> $GITHUB_STEP_SUMMARY
