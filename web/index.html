<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1 + user-scalable=no block the browser's own
         pinch / double-tap / input-focus zoom on touch devices. The
         playground is an app-like surface (Monaco, the React Flow model
         canvas) that handles its own zoom; without this, iOS Safari
         auto-zooms on a small-font input or a stray pinch and the canvas
         then swallows the pinch-out, trapping the user until reload. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1A1B1E" />
    <title>Loom Playground</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
